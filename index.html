<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>名店ものがたり3D — 人生経営シム</title>
<style>
:root{--ink:#1a1a1a;--sub:#8a8a86;--card:#fff;--line:#e9e7e2;--accent:#d95d39;--accent2:#2f6f5e;--gold:#c9a227;--danger:#c0392b}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;background:#000}
#gl{position:fixed;inset:0}
canvas{display:block}
/* ---- HUD ---- */
#hud{position:fixed;top:0;left:0;right:0;padding:10px 12px;display:flex;gap:8px;align-items:flex-start;pointer-events:none;z-index:10}
.hudCard{background:rgba(255,255,255,.92);border-radius:12px;padding:7px 12px;font-size:12px;font-weight:700;box-shadow:0 2px 10px rgba(0,0,0,.15)}
#hudMoney{color:var(--accent);font-size:14px;font-variant-numeric:tabular-nums}
#hudMoney small,#hudTime small{font-size:10px;color:var(--sub);font-weight:500;display:block}
#hudTime{font-variant-numeric:tabular-nums}
#hudRight{margin-left:auto;display:flex;flex-direction:column;gap:5px;min-width:130px}
.meter{background:rgba(255,255,255,.92);border-radius:10px;padding:4px 10px;font-size:10px;color:var(--sub);font-weight:600;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.meter .bar{height:5px;border-radius:3px;background:#e8e5df;margin-top:2px;overflow:hidden}
.meter .bar>div{height:100%;border-radius:3px;transition:width .3s}
#stamBar>div{background:var(--accent2)}
#hungBar>div{background:var(--gold)}
#repRow b{color:var(--accent2)}
#buzzRow{display:none;background:rgba(217,93,57,.95);color:#fff}
#buzzRow.on{display:block}
/* ---- bottom controls ---- */
#stickZone{position:fixed;left:0;bottom:0;width:45%;height:45%;z-index:11;touch-action:none}
#stick{position:absolute;width:96px;height:96px;border-radius:50%;background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.5);display:none}
#knob{position:absolute;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.85);left:26px;top:26px}
#actBtn{position:fixed;right:16px;bottom:86px;z-index:12;background:var(--accent);color:#fff;border:none;border-radius:30px;padding:14px 22px;font-size:15px;font-weight:800;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,.3);display:none;max-width:70vw}
#actBtn:active{transform:scale(.95)}
#helpBtn{position:fixed;right:16px;bottom:150px;z-index:12;background:var(--accent2);color:#fff;border:none;border-radius:30px;padding:12px 20px;font-size:14px;font-weight:800;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,.3);display:none;max-width:70vw}
#helpBtn:active{transform:scale(.95)}
#menuBtn{position:fixed;right:16px;bottom:24px;z-index:12;background:rgba(255,255,255,.92);color:var(--ink);border:none;border-radius:30px;padding:12px 20px;font-size:13px;font-weight:800;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,.25)}
#shopBtn{position:fixed;right:118px;bottom:24px;z-index:12;background:rgba(255,255,255,.92);color:var(--ink);border:none;border-radius:30px;padding:12px 18px;font-size:13px;font-weight:800;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,.25)}
#shopBtn.open{background:var(--accent2);color:#fff}
/* ---- dialog ---- */
#dlg{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:520px;background:var(--card);border-radius:20px 20px 0 0;padding:18px 16px 24px;z-index:30;display:none;box-shadow:0 -6px 30px rgba(0,0,0,.3);max-height:70%;overflow-y:auto}
#dlg h3{font-size:15px;margin-bottom:4px}
#dlg .who{font-size:24px;margin-right:6px}
#dlgTxt{font-size:13px;line-height:1.7;color:#444;margin:8px 0 12px;min-height:20px}
.opt{display:block;width:100%;text-align:left;background:#f6f4f0;border:1.5px solid var(--line);border-radius:12px;padding:11px 14px;font-size:13px;font-weight:700;font-family:inherit;margin-bottom:8px;cursor:pointer}
.opt:active{background:#eceae4}
.opt small{display:block;font-weight:500;font-size:11px;color:var(--sub);margin-top:2px}
.opt:disabled{opacity:.4}
.opt.warn{border-color:var(--danger);color:var(--danger)}
.opt.go{background:var(--accent);color:#fff;border-color:var(--accent)}
.opt.go small{color:rgba(255,255,255,.8)}
#dlgClose{position:absolute;right:14px;top:12px;border:none;background:#eee;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer}
/* ---- modal ---- */
#modalWrap{position:fixed;inset:0;background:rgba(15,14,12,.6);display:none;align-items:center;justify-content:center;z-index:40;padding:16px}
#modalWrap.on{display:flex}
#modal{background:var(--card);border-radius:20px;padding:20px 18px;width:100%;max-width:480px;max-height:86vh;overflow-y:auto}
#modal h2{font-size:17px;margin-bottom:10px}
.line{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px dashed var(--line)}
.line b.minus{color:var(--danger)}
.line b.plus{color:var(--accent2)}
.btn{display:block;width:100%;padding:12px;border:none;border-radius:12px;background:var(--ink);color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:10px}
.btn.acc{background:var(--accent)}
.btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
.btn:disabled{opacity:.35}
.tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;background:#f0eee9;color:#6b6b66;font-weight:600;margin:2px 2px 2px 0}
.tag.on{background:var(--accent2);color:#fff}
input[type=range]{width:100%}
/* ---- toast / banner / log ---- */
#toast{position:fixed;top:110px;left:50%;transform:translateX(-50%);background:rgba(20,20,20,.88);color:#fff;font-size:12px;font-weight:700;padding:9px 18px;border-radius:24px;opacity:0;transition:opacity .3s;z-index:50;pointer-events:none;max-width:90vw;text-align:center}
#toast.on{opacity:1}
#banner{position:fixed;top:64px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.95);color:var(--ink);font-size:13px;font-weight:800;padding:10px 24px;border-radius:14px;opacity:0;transition:all .4s;z-index:20;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.2)}
#banner.on{opacity:1}
#log{position:fixed;left:12px;bottom:130px;z-index:9;pointer-events:none;font-size:11px;line-height:1.8;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8);max-width:60vw}
#log div{opacity:.9}
/* minimap & phone */
#mmap{position:fixed;right:12px;bottom:150px;width:140px;height:140px;z-index:9;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
#phoneBtn{position:fixed;left:12px;bottom:24px;z-index:12;background:var(--ink);color:#fff;border:none;border-radius:30px;padding:12px 18px;font-size:13px;font-weight:800;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,.3)}
#phoneBtn:active{transform:scale(.95)}
#mapBtn{position:fixed;left:12px;bottom:70px;z-index:12;background:rgba(255,255,255,.92);color:var(--ink);border:none;border-radius:30px;padding:11px 16px;font-size:13px;font-weight:800;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,.25)}
#mapBtn:active{transform:scale(.95)}
/* national map */
.jpmap{position:relative;width:100%;height:340px;background:linear-gradient(#dCEBF5,#eaf3ec);border-radius:14px;overflow:hidden;border:1.5px solid var(--line)}
.jpmap .sea{position:absolute;inset:0;background:radial-gradient(circle at 60% 40%,#cfe6f2,#bcd8e8)}
.pdot{position:absolute;transform:translate(-50%,-50%);width:15px;height:15px;border-radius:50%;background:#8aa0a8;border:1.5px solid #fff;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.pdot.here{background:var(--accent);width:19px;height:19px;z-index:5}
.pdot.store{background:var(--accent2);z-index:4}
.pdot.store2{background:var(--gold);z-index:4}
.pdot:active{transform:translate(-50%,-50%) scale(1.3)}
.plabel{position:absolute;transform:translate(-50%,-50%);font-size:9px;font-weight:700;color:#33413f;pointer-events:none;text-shadow:0 1px 2px rgba(255,255,255,.9);white-space:nowrap}
.reglegend{font-size:10px;color:#888;margin:6px 0}
/* staff row */
.srow{display:flex;align-items:center;gap:6px;font-size:12px;padding:7px 0;border-bottom:1px dashed var(--line)}
.srow .nm{flex:1;font-weight:700}
.srow .mood{font-size:14px}
.mini{font-size:10px;padding:4px 8px;border-radius:9px;border:1.5px solid var(--line);background:#f6f4f0;font-weight:700;font-family:inherit;cursor:pointer}
.mini.warn{border-color:var(--danger);color:var(--danger)}
.mini.acc{background:var(--accent2);color:#fff;border-color:var(--accent2)}
/* game over */
#over{position:fixed;inset:0;background:rgba(10,8,6,.92);z-index:60;display:none;align-items:center;justify-content:center;text-align:center;color:#fff;padding:20px}
#over.on{display:flex}
#over h1{font-size:28px;margin-bottom:10px;color:#e8896a}
#over p{font-size:13px;line-height:1.9;color:#ccc}
kbd{background:#eee;border-radius:4px;padding:1px 6px;font-size:11px;color:#333}
</style>
</head>
<body>
<div id="gl"></div>

<div id="hud">
  <div class="hudCard" id="hudMoney"><small>所持金</small>¥300,000</div>
  <div class="hudCard" id="hudTime"><small id="hudDay">1日目</small>06:00</div>
  <div id="hudRight">
    <div class="meter" id="repRow">評判 <b id="hudRep">30</b>／100・ブランド <b id="hudBrand">0</b></div>
    <div class="meter" id="buzzRow">🔥 バズ中！ <b id="hudBuzz"></b></div>
    <div class="meter">体力<div class="bar" id="stamBar"><div style="width:100%"></div></div></div>
    <div class="meter">空腹<div class="bar" id="hungBar"><div style="width:80%"></div></div></div>
  </div>
</div>

<div id="log"></div>
<div id="stickZone"><div id="stick"><div id="knob"></div></div></div>
<button id="actBtn">🗣 話す</button>
<button id="helpBtn">🤝 手伝う</button>
<button id="shopBtn">🔒 閉店中</button>
<button id="menuBtn">📋 メニュー</button>
<button id="phoneBtn">📱 スマホ</button>
<button id="mapBtn">🗾 マップ</button>
<canvas id="mmap" width="140" height="140"></canvas>

<div id="dlg">
  <button id="dlgClose" onclick="closeDlg()">✕</button>
  <h3><span class="who" id="dlgWho">🙂</span><span id="dlgName">？？？</span></h3>
  <div id="dlgTxt"></div>
  <div id="dlgOpts"></div>
</div>

<div id="modalWrap"><div id="modal"></div></div>
<div id="toast"></div>
<div id="banner"></div>
<div id="over"><div>
  <h1>💸 倒産…</h1>
  <p id="overTxt"></p>
  <button class="btn acc" style="max-width:280px;margin:18px auto 0" onclick="restartGame()">経験を引き継いで再挑戦</button>
</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";
// ================================================================
// 名店ものがたり3D — 全国47都道府県・空間厨房・人生経営シム（改良版）
// ================================================================
// ---------------- STATE ----------------
const DEF=()=>({
 money:300000, day:1, tmin:360, // 6:00
 rep:30, brand:0,
 stam:100, maxStam:100, hunger:80,
 skills:{nego:1,talk:1,cook:1}, xp:{nego:0,talk:0,cook:0},
 stock:[], // {t,n,q,day} 鮮度2日
 price:600, quality:1, open:false,
 staff:[], // {name,skill,wage,morale,quirk}
 rels:{oyaji:0,bank:0,mina:0,baa:0,aoki:0},
 minaKanban:false,
 loans:0, negDays:0, mktRate:1.0,
 city:null, concept:null, interiorLv:1, qsum:0, seats:4,
 hq:false, areaMgr:null, cookQ:0, inside:false, lastRoy:0,
 menu:null, habit:0,
 formation:{prep:[],main:[],serve:[]}, // 各持ち場 最大3人（名前の配列）
 formKeyY:"", formKeyT:"", nextMkt:0,
 ads:{flyer:0,sns:0,tv:0},
 st2:{owned:false,pref:null,concept:null,mgr:null,staff:[],rep:20,interiorLv:1,
      dir:{price:"std",focus:"cust",ad:0},lastPl:0,boost:0},
 activeStore:1, // 1=本店 2=2号店（旅行中）
 fr:0, // フランチャイズ加盟店数
 buffTalk:0, rivalSale:0,
 buzzDays:0, buzzMult:1, buzzKind:"", buzzLostWarn:false,
 useToday:{}, useHist:{}, // 仕入れ支援：材料消費の実績
 sales:0, custs:0, lost:0, // 当日集計
 sleptDay:0, gameOver:false, restarts:0,
});
let S=DEF();
function save(){try{localStorage.setItem("meiten3d",JSON.stringify(S));}catch(e){}}
function load(){try{const d=localStorage.getItem("meiten3d");if(d)S=deepMerge(DEF(),JSON.parse(d));}catch(e){}}
function deepMerge(def,saved){ // 旧セーブでも欠けたキーを補完
  const o=Object.assign({},def);
  for(const k in saved){
    if(saved[k]&&typeof saved[k]==="object"&&!Array.isArray(saved[k])&&def[k]&&typeof def[k]==="object"&&!Array.isArray(def[k]))
      o[k]=deepMerge(def[k],saved[k]);
    else o[k]=saved[k];
  }
  return o;
}
const $=id=>document.getElementById(id);
const fmt=n=>"¥"+Math.round(n).toLocaleString();
const R=(a,b)=>a+Math.random()*(b-a);
const RI=(a,b)=>Math.floor(R(a,b+1));
const pick=a=>a[Math.floor(Math.random()*a.length)];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function stockTotal(t){return S.stock.reduce((a,s)=>a+((t&&s.t!==t)?0:s.n),0);}
function trackUse(t,n){S.useToday[t]=(S.useToday[t]||0)+n;}
function consumeType(t,n){
  S.stock.sort((a,b)=>a.day-b.day);
  let left=n,qacc=0;
  for(const s of S.stock){
    if(s.t!==t)continue;
    const k=Math.min(s.n,left);s.n-=k;left-=k;qacc+=k*(s.q===undefined?1:s.q);
    if(left<=0)break;
  }
  S.stock=S.stock.filter(s=>s.n>0);
  trackUse(t,n-left);
  return n>0?qacc/n:1;
}
function consumeStock(n){ // 種類問わずn個（研究・自炊用）
  S.stock.sort((a,b)=>a.day-b.day);
  let left=n,qacc=0;
  for(const s of S.stock){const t=Math.min(s.n,left);s.n-=t;left-=t;qacc+=t*(s.q===undefined?1:s.q);trackUse(s.t,t);if(left<=0)break;}
  S.stock=S.stock.filter(s=>s.n>0);
  return n>0?qacc/n:1;
}
function skillLv(k){return 1+Math.floor(S.xp[k]/5);}
function gainXp(k,n){const b=skillLv(k);S.xp[k]+=n;if(skillLv(k)>b)toast("📈 "+({nego:"交渉",talk:"話術",cook:"料理"})[k]+"Lv"+skillLv(k)+"にアップ！");}
function hourNow(){return S.tmin/60;}
function clock(){const h=Math.floor(S.tmin/60)%24,m=Math.floor(S.tmin%60);return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");}
// ---------------- 全国47都道府県・地方 ----------------

function segHourW(k){
  const h=hourNow();
  if(k==="student")return h<11?0.6:h<15?1.2:h<18?1.4:h<22?1.0:0.4;
  if(k==="salary") return (h>=11&&h<14)?1.6:(h>=18&&h<23)?1.4:0.6;
  if(k==="oyaji")  return h>=17?1.6:0.5;
  if(k==="family") return (h>=11&&h<14)?1.3:(h>=17&&h<20)?1.4:h>=21?0.1:0.5;
  if(k==="couple") return h>=16?1.5:0.6;
  if(k==="tourist")return (h>=9&&h<18)?1.2:0.9;
  return 1;
}
function pickSeg(){
  const w=[];let tot=0;
  for(const k in SEG3){const x=segHourW(k)*(conC().seg[k]||1)*(k==="tourist"?cityC().tourist:1);w.push([k,x]);tot+=x;}
  let r=Math.random()*tot;
  for(const [k,x] of w){r-=x;if(r<=0)return k;}
  return "salary";
}

function makeLabel(txt,scale,bg){
  scale=scale||1;bg=bg||"rgba(30,26,22,.85)";
  const c=document.createElement("canvas");c.width=256;c.height=64;
  const x=c.getContext("2d");
  x.fillStyle=bg;const w=Math.min(250,txt.length*26+20);
  x.fillRect((256-w)/2,8,w,48);
  x.fillStyle="#fff";x.font="bold 26px sans-serif";x.textAlign="center";x.textBaseline="middle";
  x.fillText(txt,128,33);
  const t=new THREE.CanvasTexture(c);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true}));
  s.scale.set(8*scale,2*scale,1);return s;
}

function building(x,z,w,d,h,color,label,roofColor){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({color}));
  body.position.y=h/2;g.add(body);
  const roof=new THREE.Mesh(new THREE.BoxGeometry(w+0.8,0.8,d+0.8),new THREE.MeshLambertMaterial({color:roofColor||0x8a5a3c}));
  roof.position.y=h+0.4;g.add(roof);
  const wm=new THREE.MeshBasicMaterial({color:0xfff3c9});
  for(let i=-w/2+1.5;i<w/2-1;i+=2.4){
    const win=new THREE.Mesh(new THREE.PlaneGeometry(1.2,1),wm);
    win.position.set(i,h*0.55,d/2+0.02);g.add(win);
  }
  const lb=makeLabel(label);lb.position.y=h+2.2;g.add(lb);
  g.position.set(x,0,z);scene.add(g);
  solids.push({x,z,w:w+1,d:d+1});
  MAPB.push({x,z,w,d,c:"#"+color.toString(16).padStart(6,"0")});
  return g;
}

function wSpeed(st,p){
  if(!st){let v=0.75+skillLv("cook")*0.12;if(p==="serve")v+=0.2;return v;} // プレイヤー
  let v=0.5+st.skill*0.18;
  if(st.quirk==="早起き"&&hourNow()<15)v*=1.25;
  if(st.quirk==="接客の天才"&&p==="serve")v*=1.3;
  if(st.quirk==="研究熱心"&&p==="main")v*=1.12;
  if(st.quirk==="無口だが丁寧")v*=1.08;
  if(st.quirk==="ムードメーカー")v*=1.05;

function makeOrder(c){
  ensureMenu();
  const avail=()=>S.menu.map((d,i)=>({d,i})).filter(x=>x.d.rec.every(t=>stockTotal(t)>=1));
  if(!avail().length){noStockLeave(c);return;}
  const n=orderCount(c.seg);
  c.order=[];c.served=0;c.qtot=0;
  for(let k=0;k<n;k++){

    const {d,i}=pick(cands);
    let dq=0;d.rec.forEach(t=>{dq+=consumeType(t,1);});
    c.qtot+=dq/d.rec.length;
    const tk={c,idx:i,seg:c.seg,stage:"prep",prog:0};
    tickets.push(tk);c.order.push(tk);

  if(!c.order.length){noStockLeave(c);return;}
  c.phase="wait";c.wait=0;
  checkStockAfter();
}

const STAGE_LEN={prep:2.4,main:3.6,serve:2.6};
function advanceTicket(tk){
  if(tk.stage==="prep")tk.stage="main";
  else if(tk.stage==="main"){tk.stage="serve";
    let qc=0;staffListAt("main").forEach(st=>{if(st.quirk==="研究熱心")qc+=0.12;if(st.instr==="care")qc+=0.08;});
    if(kPost==="main")qc+=0.04;
    if(qc>0&&Math.random()<qc)S.cookQ=Math.min(15,S.cookQ+1);
  }else if(tk.stage==="serve")deliverTicket(tk);
}
function deliverTicket(tk){
  const i=tickets.indexOf(tk);if(i>=0)tickets.splice(i,1);
  const c=tk.c;
  let pay=Math.round(dishPrice(tk.idx)*SEG3[c.seg].mult*(1+S.habit*0.01));
  let mark="";
  if(S.cookQ>0){S.cookQ--;pay=Math.round(pay*1.25);S.rep=clamp(S.rep+0.03,0,100);mark="✨";}
  S.money+=pay;S.sales+=pay;
  moneyFx(mark+"+"+fmt(pay),R(-3,3),R(12,16));
  c.served=(c.served||0)+1;
  if(c.order&&c.served>=c.order.length){
    S.custs++;S.qsum+=(c.qtot||1)/c.order.length;
    c.phase="eat";c.t=R(3,6)+c.order.length*0.8;
  }
}
function processKitchen(dt){
  for(const p of ["serve","main","prep"]){ // 逆順で1フレーム多重進行を防ぐ
    const speeds=workerSpeeds(p);if(!speeds.length)continue;
    const q=tickets.filter(tk=>tk.stage===p);
    for(let i=0;i<speeds.length&&i<q.length;i++){
      const tk=q[i];tk.prog+=speeds[i]*dt/STAGE_LEN[p];
      if(tk.prog>=1){tk.prog=0;advanceTicket(tk);}
    }
  }
}

  if(S.open)pullFromQueue();

    if(c.phase==="walk"){
      const w=c.wp[0];const dx=w[0]-c.m.position.x,dz=w[1]-c.m.position.z,d=Math.hypot(dx,dz);
      if(d<0.8){c.wp.shift();if(!c.wp.length)onArrive(c);}
      else{c.m.position.x+=dx/d*3.2*dt;c.m.position.z+=dz/d*3.2*dt;c.m.rotation.y=Math.atan2(dx,dz);c.m.position.y=Math.abs(Math.sin(ts*0.013+i))*0.12;}
    }else if(c.phase==="queue"){
      const tg=qTarget(c.qslot);const dx=tg[0]-c.m.position.x,dz=tg[1]-c.m.position.z,d=Math.hypot(dx,dz);
      if(d>0.3){c.m.position.x+=dx/d*2.6*dt;c.m.position.z+=dz/d*2.6*dt;c.m.rotation.y=Math.atan2(dx,dz);}
      else c.m.rotation.y=Math.PI; // 入口を向く
      c.pat-=dt;
      if(c.pat<=0){const qi=queue.indexOf(c);if(qi>=0){queue.splice(qi,1);reflowQueue();}
        c.phase="leave";c.angry=true;c.tx=pick([-52,52]);S.lost++;S.rep=clamp(S.rep-0.15,0,100);
        notifyStock("😞 行列に待ちきれず帰る客が…席を増やすか回転を上げよう","qleave",true);}
    }else if(c.phase==="order"){
      c.t-=dt;if(c.t<=0)makeOrder(c);
    }else if(c.phase==="wait"){
      c.wait+=dt;
      if(c.served<c.order.length&&c.wait>42){abandon(c);}
    }else if(c.phase==="eat"){
      c.t-=dt;
      if(c.t<=0){releaseSeat(c);c.m.visible=true;c.m.position.set(R(-2,2),0,13);c.phase="leave";c.angry=false;c.tx=pick([-52,52]);pullFromQueue();}
    }else if(c.phase==="leave"){
      const dx=c.tx-c.m.position.x;
      c.m.position.x+=Math.sign(dx)*3.5*dt;c.m.position.z+=(0-c.m.position.z)*dt*0.5;
      c.m.rotation.y=Math.atan2(Math.sign(dx),0);c.m.position.y=Math.abs(Math.sin(ts*0.02+i))*0.1;
      if(Math.abs(dx)<2)removeCust(c);
    }
  }
  processKitchen(dt);
  // 座席の客を軽く揺らす
  for(let i=0;i<S.seats;i++){if(seats[i]){const sm=seatMesh[i];sm.position.y=Math.abs(Math.sin(ts*0.006+i))*0.05;}}
  updateKitchenStaff(ts);
}
function updateKitchenStaff(ts){
  for(const p of POSN){
    const list=staffListAt(p);
    for(let i=0;i<3;i++){
      const m=kMesh[p][i];
      if(i<list.length){
        m.visible=true;const sp=STA[p].spots[i];m.position.set(sp[0],0,sp[1]);m.rotation.y=Math.PI;
        const busy=backlog(p)>0&&S.open;
        m.position.y=busy?Math.abs(Math.sin(ts*0.013+i*1.3+POSN.indexOf(p)))*0.14:0;
        const nm=list[i].name+(list[i].mina?"🎀":"");
        if(m._nm!==nm)setMeshLabel(m,nm);
      }else{m.visible=false;if(m._nm)setMeshLabel(m,"");}
    }
  }
}

function collide(nx,nz){
  for(const s of solids){
    if(Math.abs(nx-s.x)<s.w/2+0.6&&Math.abs(nz-s.z)<s.d/2+0.6)return true;
  }

}

function travelTo(store){
  const destPref=store===2?S.st2.pref:S.city;
  const fromPref=curPrefKey();
  if(store===S.activeStore){toast("すでにここにいます");closeModal();return;}
  const dist=Math.hypot(PREF[destPref].x-PREF[fromPref].x,PREF[destPref].y-PREF[fromPref].y);
  const fare=Math.round(2000+dist*280);
  const hrs=clamp(Math.round(dist/12),1,6);
  if(S.money<fare){toast("運賃"+fmt(fare)+"が足りない");return;}
  S.money-=fare;S.tmin=Math.min(1439,S.tmin+hrs*60);
  if(S.activeStore===1)S.open=false; // 本店を離れると自動閉店
  resetService();
  S.activeStore=store;S.inside=false;player.position.set(0,0,12);
  for(let i=0;i<MAXSEATS;i++)seatMesh[i].visible=false;
  applyTheme();repaintShop();closeModal();
  banner("🚄 "+PREF[destPref].short+"へ移動（運賃"+fmt(fare)+"・"+hrs+"時間）");
  log((store===2?"2号店":"本店")+"（"+PREF[destPref].short+"）へ移動した");
  renderHud();save();
}

  modal(`<h2>${change?"🛠 業態転換（¥150,000）":"🏮 本店のコンセプトを決めよう"}</h2>`+
   Object.keys(CONCEPTS).map(k=>{const c=CONCEPTS[k];
    return `<button class="opt" onclick="chooseConcept('${k}',${change?1:0})">${c.e} ${c.n}<small>${c.desc}</small></button>`;}).join("")+
   (change?'<button class="btn ghost" onclick="closeModal()">やめる</button>':""));
}
function chooseConcept(k,change){
  if(change){
    if(S.money<150000){toast("¥150,000必要");return;}
    if(S.concept===k){toast("いまと同じコンセプトだ");return;}
    S.money-=150000;
  }
  S.concept=k;
  S.menu=BASE_MENUS[k].slice(0,Math.max(2,Math.min(6,Math.ceil(S.quality*0.6)))).map(d=>({n:d.n,rec:d.rec.slice()}));
  repaintShop();closeModal();
  banner(conC().e+" "+prefC().short+"に「"+CONCEPTS[k].n+"」"+(change?"へ業態転換！":"を開業！"));
  log(change?"店を「"+CONCEPTS[k].n+"」に改装した":prefC().n+"で「"+CONCEPTS[k].n+"」を開業した");
  save();renderHud();
}

  const invStr=ALLT.filter(t=>stockTotal(t)>0).map(t=>ING[t].e+stockTotal(t)).join(" ")||"なし";
  const out=neededTypes().filter(t=>stockTotal(t)<=0);

   `材料：${invStr}（明日廃棄 ${spoilSoon}個）${out.length?'<br><b style="color:var(--danger)">⚠️ '+out.map(t=>ING[t].n).join("・")+'が在庫切れ！</b>':""}<br>基準単価 <b>${fmt(S.price)}</b>（適正${fmt(fairPrice())}）／品質Lv<b>${S.quality}</b>・${S.menu.length}品目・席${S.seats}<br>本日 ${S.custs}人来店 ${fmt(S.sales)}${S.lost>0?"・逃し"+S.lost+"人":""}・行列${queue.length}・習慣化Lv<b>${S.habit}</b>`,

function seatsModal(){
  closeDlg();
  const atMax=S.seats>=MAXSEATS;
  const add=Math.min(2,MAXSEATS-S.seats);
  const cost=60000+(S.seats-4)*25000;
  modal(`<h2>🪑 席数を増やす</h2>
   <p style="font-size:12px;color:#666">現在 <b>${S.seats}席</b>（最大${MAXSEATS}）。席が多いほど行列を捌けて回転UP。満席だと行列ができ、待ちきれない客は帰ってしまう。</p>
   ${atMax?'<p style="color:var(--accent2);font-weight:700">最大席数です！</p>':
     `<button class="opt go" onclick="buySeats(${add},${cost})">+${add}席にする（${fmt(cost)}）<small>${S.seats}→${S.seats+add}席</small></button>`}
   <button class="btn ghost" onclick="closeModal()">閉じる</button>`);
}
function buySeats(add,cost){
  if(S.money<cost){toast("💸 お金が足りない");return;}
  S.money-=cost;S.seats=Math.min(MAXSEATS,S.seats+add);
  banner("🪑 席を増やした（"+S.seats+"席）");log("席数を"+S.seats+"席に増やした");closeModal();renderHud();save();
}

function assignUI(p){
  const used=assignedNames();
  const avail=S.staff.filter(s=>!used.has(s.name));
  modal(`<h2>${PNAME[p]} に配置</h2>`+
   (avail.length?avail.map(s=>`<button class="opt" onclick="doAssign('${p}','${s.name}')">${s.name} ★${s.skill}<small>${s.quirk}／機嫌${s.morale>60?"😊":s.morale>30?"😐":"😠"}</small></button>`).join(""):'<p style="color:#888;font-size:12px">配置できる空きスタッフがいない（雇用するか、他の持ち場から外す）</p>')+
   `<button class="btn ghost" onclick="formationModal()">戻る</button>`);
}
function doAssign(p,name){if((S.formation[p]||[]).length<3)S.formation[p]=(S.formation[p]||[]).concat([name]);save();formationModal();}
function unassign(p,name){S.formation[p]=(S.formation[p]||[]).filter(n=>n!==name);save();formationModal();}

  window._pp=S.price;

function setPrice(){S.price=window._pp;toast("💰 単価を"+fmt(S.price)+"に設定");closeModal();save();}
function research(){
  const cost=5000+(S.menu?S.menu.length*1500:0);
  if(S.money<cost||stockTotal()<5){toast(fmt(cost)+"と食材5個が必要（品数が増えるほど高くなる）");return;}
  if(!useStam(15))return;
  S.money-=cost;consumeStock(5);gainXp("cook",2);
  if(Math.random()<0.45+skillLv("cook")*0.06){
    ensureMenu();const d=genDish();S.menu.push(d);S.quality++;
    banner("✨ 新メニュー「"+d.n+"」を開発！（メニュー表から改名できる）");
    log("メニュー研究に成功！（"+S.menu.length+"品目）");
  }else toast("🍳 うーん、いまいち…（料理経験は積めた）");
  closeDlg();renderHud();
}
function menuModal(){
  closeDlg();ensureMenu();
  modal(`<h2>${conC().e} ${conC().n}のメニュー表（${S.menu.length}品）</h2>`+
   S.menu.map((d,i)=>`<div class="line"><span>${d.n} <span style="font-size:10px;color:#888">${d.rec.map(t=>ING[t].e).join("")}</span></span>
   <b>${fmt(dishPrice(i))} <button class="tag" onclick="renameDish(${i})">✏️</button></b></div>`).join("")+
   `<p style="font-size:11px;color:#888;margin-top:8px">絵文字＝必要材料（切らすとその料理は出せない）。✏️で改名。絶品ストック：${S.cookQ}</p>
   <button class="btn" onclick="closeModal()">閉じる</button>`);
}
function renameDish(i){
  const n=prompt("新しいメニュー名（12文字まで）",S.menu[i].n);
  if(n&&n.trim()){S.menu[i].n=n.trim().slice(0,12);save();}
  menuModal();
}

const HELPPT={prep:[195.0,201.5],main:[200.0,201.5],serve:[205.4,201.5]};
const HELPVERB={prep:"隣で一緒に切る",main:"火加減を見て手伝う",serve:"料理を客席へ運ぶ"};
function toggleHelp(p){
  kPost=(kPost===p)?null:p;
  toast(kPost?"🤝 "+PNAME[p].slice(2)+"に入った！（あなたも1人分の戦力）":"手伝いをやめた");
}
function nearestStation(){
  if(!S.inside)return null;
  let best=null,bd=2.4;
  for(const p of POSN){const d=Math.hypot(player.position.x-HELPPT[p][0],player.position.z-HELPPT[p][1]);if(d<bd){bd=d;best=p;}}
  return best;
}
function stationDialog(p){
  const list=staffListAt(p);
  const opts=[];
  opts.push({label:kPost===p?"✋ 手伝いをやめる":"🤝 手伝う（"+HELPVERB[p]+"）",cls:"go",fn:()=>{toggleHelp(p);closeDlg();}});
  list.forEach(st=>opts.push({label:"🗣 "+st.name+"に指示",sub:"今の指示："+(st.instr==="hurry"?"急いで":st.instr==="care"?"ていねいに":"ふつう")+"／機嫌"+(st.morale>60?"😊":st.morale>30?"😐":"😠"),fn:()=>instructStaff(st.name,p)}));
  if(!list.length)opts.push({label:"（この持ち場は空き。手伝いで入れる）",dis:true});
  opts.push({label:"閉じる",fn:closeDlg});
  openDlg("👨‍🍳",PNAME[p],"待ち皿 → 仕込み"+backlog("prep")+"・調理"+backlog("main")+"・提供"+backlog("serve")+"　どうする？",opts);
}
function instructStaff(name,p){
  const st=S.staff.find(s=>s.name===name);if(!st)return;
  openDlg("🗣",st.name,"「はい店長！どうしますか？」",
   [
    {label:"急いで！",sub:"スピード+30%（少し雑に）",fn:()=>{st.instr="hurry";toast(st.name+"「了解、飛ばします！」");closeDlg();}},
    {label:"ていねいに",sub:"スピード-15%（絶品が生まれやすい）",fn:()=>{st.instr="care";toast(st.name+"「かしこまりました」");closeDlg();}},
    {label:"ふつうのペースで",fn:()=>{st.instr=null;toast(st.name+"「わかりました」");closeDlg();}},
    {label:"励ます（機嫌+8・1日1回）",fn:()=>{if(dayFlags["rest_"+st.name]===S.day){toast("さっき声をかけた");return;}dayFlags["rest_"+st.name]=S.day;st.morale=Math.min(100,st.morale+8);gainXp("talk",1);toast("💪 "+st.name+"の機嫌が上がった");closeDlg();}},
    {label:"戻る",fn:()=>stationDialog(p)},

let toutCd=0;
function doTout(){
  if(toutCd>0){toast("さっき声かけしたばかり（"+Math.ceil(toutCd)+"秒）");return;}
  if(!useStam(10))return;
  gainXp("talk",1);toutCd=25;
  const p=0.30+skillLv("talk")*0.07+(S.minaKanban?0.05:0);
  if(Math.random()<p){
    S.buffTalk=120;
    const n=RI(2,4);for(let i=0;i<n;i++)setTimeout(spawnCust,i*800);
    banner("📣 客引き成功！"+n+"組が店へ向かった！");log("客引きが刺さった！");
  }else if(Math.random()<0.12){
    S.rep=clamp(S.rep-1,0,100);toast("💢 しつこいと通報された…（評判-1）");

function demandPerMin(){
  if(S.activeStore!==1)return 0;
  const h=hourNow(),cn=conC(),ct=cityC();
  let base=(h>=11&&h<14)?3.2:(h>=18&&h<22)?3.8:(h>=6&&h<23)?0.8:0.15;
  base*=ct.traffic*(h<17?cn.day:cn.night*ct.nightF);
  const fp=fairPrice();
  const priceF=clamp(Math.exp(-(S.price-fp)/(fp*0.8*(cn.priceTol||1))),0.1,1.8);
  const intF=1+(S.interiorLv-1)*0.05;
  base*=intF*(S.inside&&S.open?1.1:1);
  const repF=0.3+S.rep/60;
  const adF=1+(S.ads.flyer>0?0.2:0)+(S.ads.sns>0?0.35:0)+(S.ads.tv>0?0.8:0);
  const toutF=S.buffTalk>0?1.8:1;
  const brandF=1+S.brand/100;
  const rivalF=S.rivalSale>0?0.6:0.85;
  const minaF=S.minaKanban?1.15:1;
  const buzzF=S.buzzDays>0?S.buzzMult:1;
  return base*priceF*repF*adF*toutF*brandF*rivalF*minaF*buzzF;
}

}

function settle(){
  if(S.custs>0)S.formKeyT=formKey();
  S.day++;
  const homePref=PREF[S.city]||PREF.tokyo;
  const rent=3000+homePref.rent;
  const util=S.custs>0||S.open?2000:0;
  const wages=S.staff.reduce((a,s)=>a+s.wage,0)+(S.areaMgr?S.areaMgr.wage:0);
  const interest=Math.round(S.loans*0.01);
  // 廃棄
  let waste=0;
  S.stock=S.stock.filter(s=>{if(S.day-s.day>=2){waste+=s.n;return false;}return true;});
  const wasteCost=waste*180;
  // 2号店（店長運営＋指示）
  let st2pl=0;
  if(S.st2.owned){
    if(S.st2.mgr){
      const p2=PREF[S.st2.pref];const dir=S.st2.dir||{price:"std",focus:"cust",ad:0};
      let b=S.st2.mgr.skill*9000+S.rep*160+S.st2.rep*120;
      b*=p2.traffic*(0.9+p2.tourist*0.1);
      if(dir.price==="low")b*=1.15;else if(dir.price==="high")b*=0.95;
      if(dir.focus==="cust")b*=1.08;else if(dir.focus==="quality")b*=1.03;
      b+=S.st2.staff.reduce((a,s)=>a+s.skill*2500,0);
      b*=(1+(S.st2.boost||0));
      const adCost=dir.ad>0?dir.ad*10000:0;
      const wages2=S.st2.mgr.wage+S.st2.staff.reduce((a,s)=>a+s.wage,0);
      const ru=p2.rent+5000;
      st2pl=Math.round(b*R(0.7,1.3)-wages2-ru-adCost);
      S.st2.rep=clamp(S.st2.rep+(dir.focus==="quality"?1.2:0.4)+(S.st2.mgr.skill>=4?0.6:0)-0.3,0,100);
      if(dir.ad>0)S.st2.dir.ad=Math.max(0,dir.ad-1);
    }else st2pl=-9000;
    S.st2.boost=0;
  }
  // FCロイヤリティ
  let roy=0;
  if(S.fr>0){
    roy=Math.round(S.fr*R(4000,14000)*(1+S.brand/100)*(1+S.habit*0.02));
    if(S.areaMgr)roy=Math.round(roy*(1+S.areaMgr.skill*0.06));
    if(Math.random()<(S.areaMgr?0.02:0.06)){S.rep=clamp(S.rep-4,0,100);log("📰 FC店で接客トラブル！本部の評判に傷が…（評判-4）");}
  }
  S.lastRoy=roy;S.st2.lastPl=st2pl;
  S.money+=roy+st2pl-rent-util-wages-interest;
  // 従業員モラール
  S.staff=S.staff.filter(st=>{
    st.morale+=(st.wage>=st.skill*2800?4:-9);
    if(st.morale<28&&Math.random()<0.5){log("💨 "+st.name+"が辞めてしまった…（不満）");POSN.forEach(p=>{S.formation[p]=(S.formation[p]||[]).filter(n=>n!==st.name);});return false;}
    return true;
  });
  // 評判ドリフト
  if(S.custs>0&&S.lost>S.custs*0.3)S.rep=clamp(S.rep-2,0,100);
  if(S.custs>=15&&S.quality>=3)S.rep=clamp(S.rep+1.5,0,100);
  if(S.custs===0)S.rep=clamp(S.rep-0.5,0,100);
  if(S.custs>=8){
    const qavg=S.qsum/S.custs;
    if(qavg>=1.6){S.rep=clamp(S.rep+1.5,0,100);log("🥬 高級食材が話題に（評判+）");}
    else if(qavg<=0.4){S.rep=clamp(S.rep-1.5,0,100);log("🧊 「安い食材使ってるらしい」と噂が…（評判-）");}
  }
  S.qsum=0;
  // 改善9: バズ判定
  if(S.buzzDays>0){
    S.buzzDays--;
    if(S.custs>0&&S.lost>S.custs*0.5){S.rep=clamp(S.rep-3,0,100);log("📉 バズ中に捌けず“期待外れ”の声が…（評判-3）");}
    if(S.buzzDays<=0){S.buzzMult=1;log("🔥 バズが落ち着いた");}
  }else{
    let chance=0.02+S.brand*0.002;
    if(S.ads.sns>0)chance+=0.10;
    if(S.quality>=4)chance+=0.05;
    if(S.custs>=20&&S.lost<=S.custs*0.15)chance+=0.06;
    if(S.rep>=70)chance+=0.05;
    if(Math.random()<clamp(chance,0,0.55)){
      S.buzzDays=RI(2,3);S.buzzMult=R(2.0,2.8);
      S.rep=clamp(S.rep+3,0,100);S.brand=clamp(S.brand+4,0,100);
      S.buzzKind=pick(["SNSでバズった","TV取材が来た","有名インフルエンサー来店","行列が行列を呼んだ"]);
      banner("🔥 【"+S.buzzKind+"】明日から"+S.buzzDays+"日間、客が殺到！席と人手の準備を！");
      log("🔥 店がバズった（"+S.buzzKind+"）！");
    }
  }
  S.brand=clamp(Math.max(0,S.rep-50)*0.6+S.fr*4+(S.st2.owned?3:0),0,100);
  // 広告・相場・ライバル
  for(const k in S.ads)if(S.ads[k]>0)S.ads[k]--;
  S.mktRate=S.nextMkt||R(0.8,1.3);S.nextMkt=R(0.8,1.3);hagDisc=0;
  // 習慣化Lv
  if(S.formKeyT&&S.formKeyT===S.formKeyY)S.habit=Math.min(10,S.habit+1);
  else if(S.formKeyY&&S.formKeyT&&S.formKeyT!==S.formKeyY)S.habit=Math.max(0,S.habit-1);
  S.formKeyY=S.formKeyT;S.formKeyT="";
  S.rivalSale=Math.random()<0.2?1:0;
  if(S.rivalSale)log("⚔️ ライバル亭が今日はセールをやるらしい…");
  // 仕入れ実績を記録（改善2）
  for(const t of ALLT){const h=S.useHist[t]||[];h.push(S.useToday[t]||0);if(h.length>3)h.shift();S.useHist[t]=h;}
  S.useToday={};
  // サマリー
  const net=S.sales+roy+st2pl-rent-util-wages-interest;
  modal(`<h2>📒 ${S.day-1}日目の決算</h2>
   <div class="line"><span>本店 売上（${S.custs}人来店）</span><b class="plus">+${fmt(S.sales)}</b></div>
   ${roy>0?`<div class="line"><span>FCロイヤリティ（${S.fr}店）</span><b class="plus">+${fmt(roy)}</b></div>`:""}
   ${S.st2.owned?`<div class="line"><span>2号店 損益（${PREF[S.st2.pref].short}）</span><b class="${st2pl>=0?"plus":"minus"}">${st2pl>=0?"+":""}${fmt(st2pl)}</b></div>`:""}
   <div class="line"><span>家賃（本店＋自宅）</span><b class="minus">-${fmt(rent)}</b></div>
   <div class="line"><span>水道光熱費</span><b class="minus">-${fmt(util)}</b></div>
   <div class="line"><span>人件費（本店）</span><b class="minus">-${fmt(wages)}</b></div>
   ${interest>0?`<div class="line"><span>借金利息</span><b class="minus">-${fmt(interest)}</b></div>`:""}
   ${waste>0?`<div class="line"><span>⚠️ 食材廃棄 ${waste}個</span><b class="minus">${fmt(-wasteCost)}相当</b></div>`:""}
   ${S.lost>0?`<div class="line"><span>😠 満席・品切れで逃した客</span><b class="minus">${S.lost}人</b></div>`:""}
   <div class="line" style="border-bottom:2px solid #333"><span><b>収支</b></span><b class="${net>=0?"plus":"minus"}">${net>=0?"+":""}${fmt(net)}</b></div>
   <div class="line"><span>現在の所持金</span><b class="${S.money>=0?"":"minus"}">${fmt(S.money)}</b></div>
   ${S.buzzDays>0?'<p style="font-size:12px;color:var(--accent);font-weight:700;margin-top:6px">🔥 バズ継続中！残'+S.buzzDays+'日</p>':""}
   <button class="btn acc" onclick="closeModal()">${S.day}日目スタート</button>`);
  if(S.money<0){S.negDays++;if(S.negDays>=2){gameOver();return;}banner("🚨 資金がマイナス！明日も赤字なら倒産！！");}
  else S.negDays=0;
  S.open=false;S.sales=0;S.custs=0;S.lost=0;
  stockWarned={};resetService();
  renderHud();save();
}

function dlgShop2(){

      st2.mgr.morale=Math.min(100,st2.mgr.morale+8);toast("💪 "+st2.mgr.name+"「ありがとうございます！」");closeDlg();

    {label:"戻る",fn:closeDlg},
   ]);
}
function store2Directives(){
  const d=S.st2.dir;

   [
    {label:"価格方針を変える",fn:()=>openDlg("🗣","価格方針","どうする？",[

      {label:"戻る",fn:store2Directives},
    ])},
    {label:"注力ポイントを変える",fn:()=>openDlg("🗣","注力","どこに力を入れる？",[
      {label:"集客に力を入れる",fn:()=>{d.focus="cust";toast("注力：集客");save();store2Directives();}},
      {label:"品質を磨く",fn:()=>{d.focus="quality";toast("注力：品質（評判UP）");save();store2Directives();}},
      {label:"接客を丁寧に",fn:()=>{d.focus="serve";toast("注力：接客");save();store2Directives();}},
      {label:"戻る",fn:store2Directives},
    ])},
    {label:"広告を打たせる（3日・¥30,000）",sub:d.ad>0?"実施中 残"+d.ad+"日":"2号店の集客を底上げ",fn:()=>{
      if(S.money<30000){toast("💸 お金が足りない");return;}S.money-=30000;d.ad=3;toast("📣 2号店で広告開始");renderHud();save();closeDlg();
    }},
    {label:"閉じる",fn:closeDlg},
   ]);
}
function updateStore2Interior(ts){
  const roster=[S.st2.mgr].concat(S.st2.staff).filter(Boolean);
  const assign={prep:[],main:[],serve:[]},order=["serve","main","prep"];
  roster.forEach((st,i)=>assign[order[i%3]].push(st));
  for(const p of POSN)for(let i=0;i<3;i++){const m=kMesh[p][i];
    if(i<assign[p].length){m.visible=true;const sp=STA[p].spots[i];m.position.set(sp[0],0,sp[1]);m.rotation.y=Math.PI;
      m.position.y=Math.abs(Math.sin(ts*0.013+i+POSN.indexOf(p)))*0.14;
      const nm=assign[p][i].name;if(m._nm!==nm)setMeshLabel(m,nm);
    }else{m.visible=false;if(m._nm)setMeshLabel(m,"");}}
  const amb=roster.length&&S.st2.mgr?clamp(2+Math.floor(S.st2.rep/18),0,Math.min(S.seats,MAXSEATS)):0;
  for(let i=0;i<MAXSEATS;i++){const sm=seatMesh[i];
    if(i<amb){sm.visible=true;sm.children[0].material.color.setHex(SEG3[["student","salary","oyaji","family","couple","tourist"][i%6]].c);sm.position.set(SEATPOS[i][0],Math.abs(Math.sin(ts*0.006+i))*0.05,SEATPOS[i][1]);}
    else sm.visible=false;}
}
function interior2Interacts(){
  return [
    {x:200,z:208.2,r:2.4,label:"🚪 店の外に出る",fn:exitShop},
    {x:200,z:201.6,r:2.8,label:"👨‍🍳 店長のところへ（手伝う/指示）",fn:store2Kitchen},
  ];
}
// ---------------- ミニマップ ----------------
function drawMap(){
  const c=$("mmap").getContext("2d");
  c.clearRect(0,0,140,140);
  c.fillStyle="rgba(247,246,243,.92)";c.fillRect(0,0,140,140);
  const P=v=>(v+60)*(140/120);
  c.fillStyle="#b5b1a8";
  c.fillRect(P(-55),P(0)-5,P(55)-P(-55),10);
  c.fillRect(P(0)-5,P(-56),10,P(36)-P(-56)+5);
  c.fillRect(P(-35),P(-30)-4,P(35)-P(-35),8);
  MAPB.forEach(b=>{c.fillStyle=b.c;c.fillRect(P(b.x-b.w/2),P(b.z-b.d/2),Math.max(4,b.w*140/120),Math.max(4,b.d*140/120));});
  c.fillStyle="#2f6f5e";
  for(const k in NPC){c.beginPath();c.arc(P(NPC[k].m.position.x),P(NPC[k].m.position.z),2,0,7);c.fill();}
  c.fillStyle="#3a6ea5";
  custs.forEach(u=>{if(u.m.visible){c.beginPath();c.arc(P(u.m.position.x),P(u.m.position.z),2,0,7);c.fill();}});
  c.fillStyle="#d95d39";
  c.beginPath();c.arc(P(player.position.x),P(player.position.z),4.5,0,7);c.fill();
  c.strokeStyle="#fff";c.lineWidth=1.5;c.stroke();
  c.fillStyle="#7a1f0a";c.font="bold 10px sans-serif";c.fillText(S.activeStore===2?"2号":"店",P(0)-5,P(20)+4);
  if(S.inside){
    c.fillStyle="rgba(20,18,15,.55)";c.fillRect(0,0,140,140);
    c.fillStyle="#fff";c.font="bold 12px sans-serif";c.fillText(S.activeStore===2?"🏢 2号店の店内":"🏮 店内にいます",20,74);
  }
}
// ---------------- 空・昼夜 ----------------
function skyUpdate(){
  const h=hourNow();let c,i;
  if(h>=5&&h<8){c=0xffdfb8;i=0.7;}
  else if(h>=8&&h<16){c=0xbfe0ff;i=1.0;}
  else if(h>=16&&h<19){c=0xffc490;i=0.7;}
  else{c=0x1c2340;i=0.25;}
  scene.background=new THREE.Color(c);scene.fog.color.set(c);
  sun.intensity=i*0.8;amb.intensity=Math.max(0.35,i*0.9);
}
// ---------------- MAIN LOOP ----------------
let last=performance.now(),hudT=0,saveT=0;
function loop(ts){
  const dt=Math.min(0.05,(ts-last)/1000);last=ts;
  if(!S.gameOver){
    S.tmin+=dt*2;
    if(S.tmin>=1440){S.tmin-=1440;settle();}
    if(hourNow()>=2&&hourNow()<3&&S.sleptDay<S.day&&S.tmin>=120&&S.tmin<180){
      S.money-=10000;if(S.activeStore!==1){S.activeStore=1;applyTheme();repaintShop();}
      player.position.set(-38,0,17.5);S.inside=false;
      banner("😵 過労で倒れた…病院代¥10,000（家に運ばれた）");
      S.tmin=360;S.stam=Math.round(S.maxStam*0.5);S.sleptDay=S.day;
    }
    S.hunger=clamp(S.hunger-dt*0.10,0,100);
    if(S.hunger<=5)S.stam=clamp(S.stam-dt*0.5,0,S.maxStam);
    // 移動
    if(!dlgOn){
      let mx=(keys.d||keys.arrowright?1:0)-(keys.a||keys.arrowleft?1:0)+joy.dx;
      let mz=(keys.s||keys.arrowdown?1:0)-(keys.w||keys.arrowup?1:0)+joy.dz;
      const len=Math.hypot(mx,mz);
      if(len>0.1){
        mx/=Math.max(1,len);mz/=Math.max(1,len);
        const sp=(S.stam<15?4:8)*dt;
        const bx=S.inside?[192.5,207.5]:[-52,52],bz=S.inside?[197.6,208.3]:[-56,36];
        const nx=clamp(player.position.x+mx*sp,bx[0],bx[1]);
        const nz=clamp(player.position.z+mz*sp,bz[0],bz[1]);
        if(!collide(nx,player.position.z))player.position.x=nx;
        if(!collide(player.position.x,nz))player.position.z=nz;
        player.rotation.y=Math.atan2(mx,mz);
        player.position.y=Math.abs(Math.sin(ts*0.012))*0.12;
      }else player.position.y=0;
    }
    camera.position.lerp(new THREE.Vector3(player.position.x,15,player.position.z+13),0.08);
    camera.lookAt(player.position.x,1.5,player.position.z);
    // 通行人
    peds.forEach(p=>{
      const dx=p.tx-p.m.position.x,dz=p.tz-p.m.position.z,d=Math.hypot(dx,dz);
      if(d<1){p.tx=R(-45,45);p.tz=R(-45,32);}
      else{p.m.position.x+=dx/d*p.sp*dt;p.m.position.z+=dz/d*p.sp*dt;p.m.rotation.y=Math.atan2(dx,dz);p.m.position.y=Math.abs(Math.sin(ts*0.01+p.sp*7))*0.1;}
    });
    // 接客・厨房パイプライン
    serviceTick(dt,ts);
    if(S.inside&&S.activeStore===2)updateStore2Interior(ts);
    updateCarry(ts);
    // FX
    for(let i=fx.length-1;i>=0;i--){const f=fx[i];f.age+=dt;f.s.position.y+=dt*1.5;f.s.material.opacity=1-f.age;if(f.age>1){scene.remove(f.s);fx.splice(i,1);}}
    salesTick(dt);
    checkInteract();
    skyUpdate();
    hudT+=dt;if(hudT>0.3){hudT=0;renderHud();drawMap();}
    saveT+=dt;if(saveT>10){saveT=0;save();}
  }
  renderer.render(scene,camera);
  requestAnimationFrame(loop);
}
// ---------------- INIT ----------------
load();
// 旧セーブの移行
if(S.city==="sapporo")S.city="hokkaido";
if(!PREF[S.city])S.city=S.city&&PREFKEYS.includes(S.city)?S.city:(S.city?"tokyo":null);
POSN.forEach(p=>{const v=S.formation[p];if(typeof v==="string")S.formation[p]=v?[v]:[];else if(!Array.isArray(v))S.formation[p]=[];});
if(S.st2&&S.st2.owned&&!S.st2.pref){S.st2.pref=S.city||"tokyo";S.st2.concept=S.st2.concept||S.concept||"shokudo";}
if(typeof S.seats!=="number")S.seats=4;
S.activeStore=1;S.inside=false;
if(S.gameOver){$("over").classList.add("on");$("overTxt").innerHTML="前回は倒産してしまった…。<br>再挑戦しよう。";}
if(S.minaKanban||S.staff.some(s=>s.mina)||(S.st2.mgr&&S.st2.mgr.mina))NPC.mina.m.position.set(4.5,0,14);
renderHud();
function startFlow(){if(!S.city)openNationalMap("start");else if(!S.concept)conceptModal(false);else closeModal();}
S.stock=S.stock.filter(s=>s.t);
ensureMenu();
if(S.concept)repaintShop();
if(S.city)applyTheme();
if(S.hq)buildHQ();
if(!S.gameOver&&(S.day>1||S.custs>0)&&!S.city){openNationalMap("start");}
else if(S.day===1&&S.custs===0&&S.sales===0&&!S.gameOver&&!S.city){
  modal(`<h2>🏮 名店ものがたり3D 〜全国47都道府県編〜</h2>
  <p style="font-size:13px;line-height:1.9;color:#555">
  あなたは料理人。資金<b>30万円</b>を握りしめ、日本のどこかで店を開く。<br><br>
  🚶 <b>移動</b>：WASD／矢印キー、スマホは画面左をドラッグ<br>
  🗣 <b>行動</b>：人や建物に近づいてボタン（<kbd>E</kbd>）／厨房で手伝う（<kbd>Q</kbd>）<br>
  🍳 <b>厨房</b>：各持ち場（仕込み→調理→接客）で従業員が働く。近づいて手伝い・指示！<br>
  🪑 <b>席と行列</b>：満席だと行列に。増席で回転UP<br>
  🗾 <b>全国マップ</b>：47都道府県で開業・移動・2号店出店<br>
  🔥 <b>バズ</b>：SNS×品質×神対応で客が殺到する日も<br><br>
  <b style="color:var(--danger)">⚠️ 所持金マイナスが2日続くと倒産</b></p>
  <button class="btn acc" onclick="startFlow()">人生スタート</button>`);
}else if(!S.gameOver){closeModal();}
requestAnimationFrame(loop);

</script>
