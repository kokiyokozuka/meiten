<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>名店ものがたり3D — 人生経営シム</title>
<style>
:root{--ink:#1a1a1a;--sub:#8a8a86;--card:#fff;--line:#e9e7e2;--accent:#d95d39;--accent2:#2f6f5e;--gold:#c9a227;--danger:#c0392b}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;background:#000}
#gl{position:fixed;inset:0}
canvas{display:block}
/* ---- HUD ---- */
#hud{position:fixed;top:0;left:0;right:0;padding:10px 12px;display:flex;gap:8px;align-items:flex-start;pointer-events:none;z-index:10}
.hudCard{background:rgba(255,255,255,.92);border-radius:12px;padding:7px 12px;font-size:12px;font-weight:700;box-shadow:0 2px 10px rgba(0,0,0,.15)}
#hudMoney{color:var(--accent);font-size:14px;font-variant-numeric:tabular-nums}
#hudMoney small,#hudTime small{font-size:10px;color:var(--sub);font-weight:500;display:block}
#hudTime{font-variant-numeric:tabular-nums}
#hudRight{margin-left:auto;display:flex;flex-direction:column;gap:5px;min-width:130px}
.meter{background:rgba(255,255,255,.92);border-radius:10px;padding:4px 10px;font-size:10px;color:var(--sub);font-weight:600;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.meter .bar{height:5px;border-radius:3px;background:#e8e5df;margin-top:2px;overflow:hidden}
.meter .bar>div{height:100%;border-radius:3px;transition:width .3s}
#stamBar>div{background:var(--accent2)}
#hungBar>div{background:var(--gold)}
#repRow b{color:var(--accent2)}
/* ---- bottom controls ---- */
#stickZone{position:fixed;left:0;bottom:0;width:45%;height:45%;z-index:11;touch-action:none}
#stick{position:absolute;width:96px;height:96px;border-radius:50%;background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.5);display:none}
#knob{position:absolute;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.85);left:26px;top:26px}
#actBtn{position:fixed;right:16px;bottom:86px;z-index:12;background:var(--accent);color:#fff;border:none;border-radius:30px;padding:14px 22px;font-size:15px;font-weight:800;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,.3);display:none;max-width:70vw}
#actBtn:active{transform:scale(.95)}
#menuBtn{position:fixed;right:16px;bottom:24px;z-index:12;background:rgba(255,255,255,.92);color:var(--ink);border:none;border-radius:30px;padding:12px 20px;font-size:13px;font-weight:800;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,.25)}
#shopBtn{position:fixed;right:118px;bottom:24px;z-index:12;background:rgba(255,255,255,.92);color:var(--ink);border:none;border-radius:30px;padding:12px 18px;font-size:13px;font-weight:800;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,.25)}
#shopBtn.open{background:var(--accent2);color:#fff}
/* ---- dialog ---- */
#dlg{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:520px;background:var(--card);border-radius:20px 20px 0 0;padding:18px 16px 24px;z-index:30;display:none;box-shadow:0 -6px 30px rgba(0,0,0,.3);max-height:70%;overflow-y:auto}
#dlg h3{font-size:15px;margin-bottom:4px}
#dlg .who{font-size:24px;margin-right:6px}
#dlgTxt{font-size:13px;line-height:1.7;color:#444;margin:8px 0 12px;min-height:20px}
.opt{display:block;width:100%;text-align:left;background:#f6f4f0;border:1.5px solid var(--line);border-radius:12px;padding:11px 14px;font-size:13px;font-weight:700;font-family:inherit;margin-bottom:8px;cursor:pointer}
.opt:active{background:#eceae4}
.opt small{display:block;font-weight:500;font-size:11px;color:var(--sub);margin-top:2px}
.opt:disabled{opacity:.4}
.opt.warn{border-color:var(--danger);color:var(--danger)}
.opt.go{background:var(--accent);color:#fff;border-color:var(--accent)}
.opt.go small{color:rgba(255,255,255,.8)}
#dlgClose{position:absolute;right:14px;top:12px;border:none;background:#eee;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer}
/* ---- modal ---- */
#modalWrap{position:fixed;inset:0;background:rgba(15,14,12,.6);display:none;align-items:center;justify-content:center;z-index:40;padding:16px}
#modalWrap.on{display:flex}
#modal{background:var(--card);border-radius:20px;padding:20px 18px;width:100%;max-width:480px;max-height:86vh;overflow-y:auto}
#modal h2{font-size:17px;margin-bottom:10px}
.line{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px dashed var(--line)}
.line b.minus{color:var(--danger)}
.line b.plus{color:var(--accent2)}
.btn{display:block;width:100%;padding:12px;border:none;border-radius:12px;background:var(--ink);color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:10px}
.btn.acc{background:var(--accent)}
.btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
.btn:disabled{opacity:.35}
.tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;background:#f0eee9;color:#6b6b66;font-weight:600;margin:2px 2px 2px 0}
.tag.on{background:var(--accent2);color:#fff}
input[type=range]{width:100%}
/* ---- toast / banner / log ---- */
#toast{position:fixed;top:110px;left:50%;transform:translateX(-50%);background:rgba(20,20,20,.88);color:#fff;font-size:12px;font-weight:700;padding:9px 18px;border-radius:24px;opacity:0;transition:opacity .3s;z-index:50;pointer-events:none;max-width:90vw;text-align:center}
#toast.on{opacity:1}
#banner{position:fixed;top:64px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.95);color:var(--ink);font-size:13px;font-weight:800;padding:10px 24px;border-radius:14px;opacity:0;transition:all .4s;z-index:20;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.2)}
#banner.on{opacity:1}
#log{position:fixed;left:12px;bottom:130px;z-index:9;pointer-events:none;font-size:11px;line-height:1.8;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8);max-width:60vw}
#log div{opacity:.9}
/* minimap & phone */
#mmap{position:fixed;right:12px;bottom:150px;width:140px;height:140px;z-index:9;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
#phoneBtn{position:fixed;left:12px;bottom:24px;z-index:12;background:var(--ink);color:#fff;border:none;border-radius:30px;padding:12px 18px;font-size:13px;font-weight:800;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,.3)}
#phoneBtn:active{transform:scale(.95)}
/* game over */
#over{position:fixed;inset:0;background:rgba(10,8,6,.92);z-index:60;display:none;align-items:center;justify-content:center;text-align:center;color:#fff;padding:20px}
#over.on{display:flex}
#over h1{font-size:28px;margin-bottom:10px;color:#e8896a}
#over p{font-size:13px;line-height:1.9;color:#ccc}
kbd{background:#eee;border-radius:4px;padding:1px 6px;font-size:11px;color:#333}
</style>
</head>
<body>
<div id="gl"></div>

<div id="hud">
  <div class="hudCard" id="hudMoney"><small>所持金</small>¥300,000</div>
  <div class="hudCard" id="hudTime"><small id="hudDay">1日目</small>06:00</div>
  <div id="hudRight">
    <div class="meter" id="repRow">評判 <b id="hudRep">30</b>／100・ブランド <b id="hudBrand">0</b></div>
    <div class="meter">体力<div class="bar" id="stamBar"><div style="width:100%"></div></div></div>
    <div class="meter">空腹<div class="bar" id="hungBar"><div style="width:80%"></div></div></div>
  </div>
</div>

<div id="log"></div>
<div id="stickZone"><div id="stick"><div id="knob"></div></div></div>
<button id="actBtn">🗣 話す</button>
<button id="shopBtn">🔒 閉店中</button>
<button id="menuBtn">📋 メニュー</button>
<button id="phoneBtn">📱 スマホ</button>
<canvas id="mmap" width="140" height="140"></canvas>

<div id="dlg">
  <button id="dlgClose" onclick="closeDlg()">✕</button>
  <h3><span class="who" id="dlgWho">🙂</span><span id="dlgName">？？？</span></h3>
  <div id="dlgTxt"></div>
  <div id="dlgOpts"></div>
</div>

<div id="modalWrap"><div id="modal"></div></div>
<div id="toast"></div>
<div id="banner"></div>
<div id="over"><div>
  <h1>💸 倒産…</h1>
  <p id="overTxt"></p>
  <button class="btn acc" style="max-width:280px;margin:18px auto 0" onclick="restartGame()">経験を引き継いで再挑戦</button>
</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";
// ================================================================
// 名店ものがたり3D — 主人公目線・破産ありガチ経営・人生シム
// ================================================================
// ---------------- STATE ----------------
const DEF=()=>({
 money:300000, day:1, tmin:360, // 6:00
 rep:30, brand:0,
 stam:100, maxStam:100, hunger:80,
 skills:{nego:1,talk:1,cook:1}, xp:{nego:0,talk:0,cook:0},
 stock:[], // {n, day} 鮮度2日
 price:600, quality:1, open:false,
 staff:[], // {name,skill,wage,morale}
 rels:{oyaji:0,bank:0,mina:0,baa:0,aoki:0},
 minaKanban:false,
 loans:0, negDays:0, mktRate:1.0,
 city:null, concept:null, interiorLv:1, qsum:0,
 hq:false, areaMgr:null, cookQ:0, inside:false, lastRoy:0,
 menu:null, habit:0, formation:{prep:null,main:null,serve:null},
 formKeyY:"", formKeyT:"", nextMkt:0,
 ads:{flyer:0,sns:0,tv:0},
 st2:{owned:false,mgr:null},
 fr:0, // フランチャイズ加盟店数
 buffTalk:0, rivalSale:0,
 sales:0, custs:0, lost:0, // 当日集計
 sleptDay:0, gameOver:false, restarts:0,
});
let S=DEF();
function save(){try{localStorage.setItem("meiten3d",JSON.stringify(S));}catch(e){}}
function load(){try{const d=localStorage.getItem("meiten3d");if(d)S=Object.assign(DEF(),JSON.parse(d));}catch(e){}}
const $=id=>document.getElementById(id);
const fmt=n=>"¥"+Math.round(n).toLocaleString();
const R=(a,b)=>a+Math.random()*(b-a);
const RI=(a,b)=>Math.floor(R(a,b+1));
const pick=a=>a[Math.floor(Math.random()*a.length)];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function stockTotal(t){return S.stock.reduce((a,s)=>a+((t&&s.t!==t)?0:s.n),0);}
function consumeType(t,n){
  S.stock.sort((a,b)=>a.day-b.day);
  let left=n,qacc=0;
  for(const s of S.stock){
    if(s.t!==t)continue;
    const k=Math.min(s.n,left);s.n-=k;left-=k;qacc+=k*(s.q===undefined?1:s.q);
    if(left<=0)break;
  }
  S.stock=S.stock.filter(s=>s.n>0);
  return n>0?qacc/n:1;
}
function skillLv(k){return 1+Math.floor(S.xp[k]/5);}
function gainXp(k,n){const b=skillLv(k);S.xp[k]+=n;if(skillLv(k)>b)toast("📈 "+({nego:"交渉",talk:"話術",cook:"料理"})[k]+"Lv"+skillLv(k)+"にアップ！");}
function hourNow(){return S.tmin/60;}
function clock(){const h=Math.floor(S.tmin/60)%24,m=Math.floor(S.tmin%60);return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");}
// ---------------- 全国・コンセプト・客層 ----------------
const CITIES={
 tokyo:  {n:"東京・下町",   short:"東京",e:"🗼",rent:15000,traffic:1.5,tourist:1.1,nightF:1.0,desc:"人通り最強・家賃も最強"},
 osaka:  {n:"大阪・商店街", short:"大阪",e:"🐙",rent:9000, traffic:1.3,tourist:1.0,nightF:1.1,desc:"商人の町。活気と競争"},
 kyoto:  {n:"京都・観光地", short:"京都",e:"⛩️",rent:11000,traffic:1.0,tourist:1.8,nightF:0.9,desc:"観光客が高単価を落とす"},
 fukuoka:{n:"福岡・屋台通り",short:"福岡",e:"🍜",rent:6000, traffic:1.1,tourist:1.2,nightF:1.4,desc:"夜がアツい町"},
 sapporo:{n:"札幌・駅前",   short:"札幌",e:"⛄",rent:8000, traffic:1.1,tourist:1.3,nightF:1.0,mkt:0.9,desc:"食材が安い（仕入れ-10%）"},
 okinawa:{n:"沖縄・ビーチ通り",short:"沖縄",e:"🌺",rent:4000,traffic:0.75,tourist:1.9,nightF:1.1,desc:"家賃激安・観光頼み"},
};
const CONCEPTS={
 shokudo:{n:"大衆食堂",e:"🍚",color:0xe0a84f,day:1.3,night:0.8,seg:{student:1.3,oyaji:1.2,salary:1.1,family:1.1,couple:0.6,tourist:0.8},desc:"昼に強いバランス型。学生とおじさんの味方"},
 izakaya:{n:"居酒屋",  e:"🏮",color:0xb85c38,day:0.5,night:1.7,seg:{oyaji:1.6,salary:1.5,student:0.9,family:0.3,couple:0.9,tourist:1.0},desc:"夜特化。おじさん・サラリーマン天国"},
 bar:    {n:"バー",    e:"🍸",color:0x4a4a6a,day:0.2,night:1.9,priceTol:1.5,seg:{couple:1.6,salary:1.3,oyaji:1.0,student:0.4,family:0.1,tourist:1.1},desc:"深夜の高単価。大人の社交場"},
 cafe:   {n:"カフェ",  e:"☕",color:0xc9a685,day:1.6,night:0.4,seg:{student:1.4,couple:1.4,family:1.0,salary:0.8,oyaji:0.5,tourist:1.2},desc:"朝昼特化。学生・カップルに人気"},
 ryotei: {n:"高級料亭",e:"👑",color:0x8a8a96,day:0.7,night:1.4,priceTol:1.9,seg:{salary:1.4,tourist:1.7,couple:1.2,family:0.8,student:0.1,oyaji:0.5},desc:"超高単価。観光客と接待需要"},
};
const SEG3={
 student:{n:"学生",        c:0x4e8f4e,mult:0.7},
 salary: {n:"サラリーマン",c:0x3a4a7a,mult:1.25},
 oyaji:  {n:"おじさん",    c:0x8a6a4a,mult:1.0},
 family: {n:"家族連れ",    c:0xe08a3e,mult:1.5},
 couple: {n:"カップル",    c:0xe88fae,mult:1.3},
 tourist:{n:"観光客",      c:0xc9a227,mult:1.7},
};
function cityC(){return CITIES[S.city]||CITIES.tokyo;}
function conC(){return CONCEPTS[S.concept]||CONCEPTS.shokudo;}
function segHourW(k){
  const h=hourNow();
  if(k==="student")return h<11?0.6:h<15?1.2:h<18?1.4:h<22?1.0:0.4;
  if(k==="salary") return (h>=11&&h<14)?1.6:(h>=18&&h<23)?1.4:0.6;
  if(k==="oyaji")  return h>=17?1.6:0.5;
  if(k==="family") return (h>=11&&h<14)?1.3:(h>=17&&h<20)?1.4:h>=21?0.1:0.5;
  if(k==="couple") return h>=16?1.5:0.6;
  if(k==="tourist")return (h>=9&&h<18)?1.2:0.9;
  return 1;
}
function pickSeg(){
  const w=[];let tot=0;
  for(const k in SEG3){const x=segHourW(k)*(conC().seg[k]||1)*(k==="tourist"?cityC().tourist:1);w.push([k,x]);tot+=x;}
  let r=Math.random()*tot;
  for(const [k,x] of w){r-=x;if(r<=0)return k;}
  return "salary";
}
// ---------------- 材料8種と専門店 ----------------
const ING={
 chicken:{n:"鶏肉",s:"鶏",e:"🍗",p:180},
 pork:  {n:"豚肉",s:"豚",e:"🥓",p:200},
 fish:  {n:"鮮魚",s:"旬魚",e:"🐟",p:260},
 veg:   {n:"野菜",s:"野菜",e:"🥬",p:120},
 rice:  {n:"米",s:"ごはん",e:"🍚",p:100},
 booze: {n:"酒・ビール",s:"地酒",e:"🍺",p:220},
 coffee:{n:"コーヒー豆",s:"珈琲",e:"☕",p:240},
 egg:   {n:"卵",s:"たまご",e:"🥚",p:90},
};
const ALLT=Object.keys(ING);
const SHOPS={
 gyomu:  {n:"業務スーパー", tier:0,types:ALLT,mult:0.6},
 oyaji:  {n:"市場・問屋",   tier:1,types:ALLT,mult:1.0},
 yaoya:  {n:"名店の八百屋", tier:2,types:["veg","egg"],mult:1.8},
 butcher:{n:"精肉店マルゴ", tier:2,types:["chicken","pork"],mult:1.8},
 fishshop:{n:"鮮魚店うみと",tier:2,types:["fish"],mult:1.8},
 brew:   {n:"ビール工房",   tier:2,types:["booze","coffee"],mult:1.8},
 riceshop:{n:"米屋こめ吉",  tier:2,types:["rice"],mult:1.8},
};
// ---------------- メニュー（無限化・レシピ制） ----------------
const BASE_MENUS={
 shokudo:[{n:"日替わり定食",rec:["veg","egg"]},{n:"焼き魚定食",rec:["fish","rice"]},{n:"カツ丼",rec:["pork","rice"]},{n:"肉野菜炒め",rec:["pork","veg"]},{n:"オムライス",rec:["egg","rice"]},{n:"名物カレー",rec:["veg","rice"]}],
 izakaya:[{n:"枝豆と生ビール",rec:["veg","booze"]},{n:"焼き鳥盛り",rec:["chicken","booze"]},{n:"もつ煮込み",rec:["pork"]},{n:"刺身盛り",rec:["fish"]},{n:"だし巻きたまご",rec:["egg"]},{n:"大将のおまかせ",rec:["fish","booze"]}],
 bar:[{n:"ジントニック",rec:["booze"]},{n:"自家製サングリア",rec:["booze"]},{n:"チーズオムレツ",rec:["egg"]},{n:"生ハムプレート",rec:["pork"]},{n:"季節のカクテル",rec:["booze"]},{n:"特製モヒート",rec:["booze"]}],
 cafe:[{n:"ブレンドコーヒー",rec:["coffee"]},{n:"たまごサンド",rec:["egg","veg"]},{n:"パンケーキ",rec:["egg"]},{n:"珈琲ゼリーパフェ",rec:["coffee","egg"]},{n:"キッシュプレート",rec:["egg","veg"]},{n:"自家焙煎スペシャル",rec:["coffee"]}],
 ryotei:[{n:"先付と椀物",rec:["veg"]},{n:"お造り",rec:["fish"]},{n:"鶏の西京焼き",rec:["chicken"]},{n:"炊き合わせ",rec:["veg","rice"]},{n:"土鍋ご飯",rec:["rice"]},{n:"おまかせ会席",rec:["fish","rice"]}],
};
function ensureMenu(){
  if(!S.concept)return;
  if(!Array.isArray(S.menu)||!S.menu.length||!S.menu[0].rec){
    const n=Math.max(2,Math.min(6,Math.ceil(S.quality*0.6)));
    S.menu=BASE_MENUS[S.concept].slice(0,n).map(d=>({n:d.n,rec:d.rec.slice()}));
  }
}
function dishPrice(i){return Math.max(100,Math.round(S.price*(0.8+i*0.1)/10)*10);}
function genDish(){
  const PRE=["特製","炙り","名物","秘伝","黄金","朝採れ","燻製","浜風","雪見","王道","裏メニューの","まかない","大人の","職人の"];
  const MET={shokudo:["定食","丼","炒め","フライ","鉄板焼き"],izakaya:["串焼き","塩焼き","煮込み","唐揚げ","なめろう"],bar:["カクテル","マリネ","アヒージョ","プレート","ソテー"],cafe:["サンド","プレート","パフェ","ラテ","タルト"],ryotei:["会席","炙り","蒸し","椀","西京焼き"]}[S.concept||"shokudo"];
  const t1=pick(ALLT),rec=[t1];
  if(Math.random()<0.5){const t2=pick(ALLT);if(t2!==t1)rec.push(t2);}
  let name=pick(PRE)+ING[t1].s+"の"+pick(MET);
  if(S.menu&&S.menu.some(d=>d.n===name))name=name+"・改";
  return {n:name.slice(0,14),rec};
}
function avgQ(){if(!S.stock.length)return 1;let q=0,n=0;S.stock.forEach(s=>{q+=(s.q===undefined?1:s.q)*s.n;n+=s.n;});return q/n;}
function fairPrice(){return 300+S.quality*150+Math.round((avgQ()-1)*120)+(S.interiorLv-1)*60;}
// ---------------- UI helpers ----------------
let toastT=null;
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("on");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("on"),2400);}
let bannerT=null;
function banner(m){const b=$("banner");b.textContent=m;b.classList.add("on");clearTimeout(bannerT);bannerT=setTimeout(()=>b.classList.remove("on"),3000);}
const logArr=[];

function makeLabel(txt,scale,bg){
  scale=scale||1;bg=bg||"rgba(30,26,22,.85)";
  const c=document.createElement("canvas");c.width=256;c.height=64;
  const x=c.getContext("2d");
  x.fillStyle=bg;const w=Math.min(250,txt.length*26+20);
  x.fillRect((256-w)/2,8,w,48);
  x.fillStyle="#fff";x.font="bold 26px sans-serif";x.textAlign="center";x.textBaseline="middle";
  x.fillText(txt,128,33);
  const t=new THREE.CanvasTexture(c);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true}));
  s.scale.set(8*scale,2*scale,1);return s;
}

const solids=[];const MAPB=[];
function building(x,z,w,d,h,color,label,roofColor){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({color}));
  body.position.y=h/2;g.add(body);
  const roof=new THREE.Mesh(new THREE.BoxGeometry(w+0.8,0.8,d+0.8),new THREE.MeshLambertMaterial({color:roofColor||0x8a5a3c}));
  roof.position.y=h+0.4;g.add(roof);
  const wm=new THREE.MeshBasicMaterial({color:0xfff3c9});
  for(let i=-w/2+1.5;i<w/2-1;i+=2.4){
    const win=new THREE.Mesh(new THREE.PlaneGeometry(1.2,1),wm);
    win.position.set(i,h*0.55,d/2+0.02);g.add(win);
  }
  const lb=makeLabel(label);lb.position.y=h+2.2;g.add(lb);
  g.position.set(x,0,z);scene.add(g);
  solids.push({x,z,w:w+1,d:d+1});
  MAPB.push({x,z,w,d,c:"#"+color.toString(16).padStart(6,"0")});
  return g;
}

const joy={on:false,dx:0,dz:0};
const zone=$("stickZone"),stick=$("stick"),knob=$("knob");
zone.addEventListener("pointerdown",e=>{
  joy.on=true;joy.sx=e.clientX;joy.sy=e.clientY;
  stick.style.display="block";
  const r=zone.getBoundingClientRect();
  stick.style.left=(e.clientX-r.left-48)+"px";
  stick.style.top=(e.clientY-r.top-48)+"px";
  zone.setPointerCapture(e.pointerId);
});
zone.addEventListener("pointermove",e=>{
  if(!joy.on)return;
  let dx=e.clientX-joy.sx,dy=e.clientY-joy.sy;
  const len=Math.hypot(dx,dy),max=42;
  if(len>max){dx*=max/len;dy*=max/len;}
  knob.style.left=(26+dx)+"px";knob.style.top=(26+dy)+"px";
  joy.dx=dx/max;joy.dz=dy/max;
});
const joyEnd=()=>{joy.on=false;joy.dx=0;joy.dz=0;stick.style.display="none";knob.style.left="26px";knob.style.top="26px";};
zone.addEventListener("pointerup",joyEnd);zone.addEventListener("pointercancel",joyEnd);
function collide(nx,nz){
  for(const s of solids){
    if(Math.abs(nx-s.x)<s.w/2+0.6&&Math.abs(nz-s.z)<s.d/2+0.6)return true;
  }
  return false;
}

let hagDisc=0;
function ingUnit(shop,t){
  let u=ING[t].p*SHOPS[shop].mult*S.mktRate*(cityC().mkt||1);
  if(shop==="oyaji"){const rel=Math.min(15,S.rels.oyaji*1.5+skillLv("nego"));u*=(1-rel/100)*(1-hagDisc);}
  if(shop==="yaoya"){const rel=Math.min(10,(S.rels.aoki||0)*1.5);u*=(1-rel/100);}
  return Math.round(u);
}

function applyTheme(){
  const T={tokyo:{g:0x9aa0a0,leaf:0x4e8f4e},osaka:{g:0xa8b088,leaf:0x5e9f4e},kyoto:{g:0xb0a488,leaf:0xa06a3e},fukuoka:{g:0x9dbf7e,leaf:0x4e8f4e},sapporo:{g:0xe4e9ee,leaf:0xcfdde6},okinawa:{g:0xd8c9a0,leaf:0x3ea06e}}[S.city];
  if(!T)return;
  ground.material.color.setHex(T.g);
  treeLeaves.forEach(l=>l.material.color.setHex(T.leaf));
  if(themeG)scene.remove(themeG);
  themeG=new THREE.Group();
  const M=(geo,c)=>new THREE.Mesh(geo,new THREE.MeshLambertMaterial({color:c}));
  if(S.city==="tokyo"){ // 赤い電波塔
    const t1=M(new THREE.ConeGeometry(4,22,4),0xd94a2a);t1.position.set(46,11,-32);themeG.add(t1);

    const b2=M(new THREE.BoxGeometry(7,5,7),0xe8e4da);b2.position.set(46,6.5,-32);themeG.add(b2);
    const r1=M(new THREE.ConeGeometry(5.5,3,4),0x2f6f5e);r1.position.set(46,10.5,-32);themeG.add(r1);
    const sh=M(new THREE.SphereGeometry(0.8,8,8),0xc9a227);sh.position.set(46,12.5,-32);themeG.add(sh);
  }else if(S.city==="kyoto"){ // 鳥居の列
    for(let i=0;i<3;i++){
      const x=40+i*5;
      const p1=M(new THREE.CylinderGeometry(0.4,0.5,7),0xc03020);p1.position.set(x,3.5,-32);themeG.add(p1);
      const p2=M(new THREE.CylinderGeometry(0.4,0.5,7),0xc03020);p2.position.set(x+3,3.5,-32);themeG.add(p2);
      const bar=M(new THREE.BoxGeometry(4.8,0.7,0.9),0xc03020);bar.position.set(x+1.5,7.2,-32);themeG.add(bar);
    }
  }else if(S.city==="fukuoka"){ // 屋台の列
    for(let i=0;i<3;i++){
      const x=12+i*5;
      const st=M(new THREE.BoxGeometry(3,2.4,2),0xd9a066);st.position.set(x,1.2,-36);themeG.add(st);
      const aw=M(new THREE.BoxGeometry(3.4,0.3,2.6),0xd94a2a);aw.position.set(x,2.7,-36);themeG.add(aw);
      const ln=M(new THREE.SphereGeometry(0.35,8,8),0xff7a3a);ln.position.set(x,2,-34.7);themeG.add(ln);
    }
  }else if(S.city==="sapporo"){ // 雪だるまと時計台
    const b1=M(new THREE.SphereGeometry(2.4,10,10),0xffffff);b1.position.set(46,2.2,-32);themeG.add(b1);
    const b2=M(new THREE.SphereGeometry(1.6,10,10),0xffffff);b2.position.set(46,5.4,-32);themeG.add(b2);
    const nose=M(new THREE.ConeGeometry(0.25,1.2,6),0xe08a3e);nose.rotation.x=Math.PI/2;nose.position.set(46,5.5,-30.2);themeG.add(nose);
    const ck=M(new THREE.BoxGeometry(4,6,4),0xe8e0d0);ck.position.set(38,3,-34);themeG.add(ck);
    const cr=M(new THREE.ConeGeometry(3.2,2.5,4),0xa03030);cr.position.set(38,7.2,-34);themeG.add(cr);
  }else if(S.city==="okinawa"){ // 海とヤシの木
    const sea=new THREE.Mesh(new THREE.PlaneGeometry(220,44),new THREE.MeshLambertMaterial({color:0x3aa9d9}));
    sea.rotation.x=-Math.PI/2;sea.position.set(0,0.015,-82);themeG.add(sea);

      }

function consumeStock(n){
  S.stock.sort((a,b)=>a.day-b.day);
  let left=n,qacc=0;
  for(const s of S.stock){const t=Math.min(s.n,left);s.n-=t;left-=t;qacc+=t*(s.q===undefined?1:s.q);if(left<=0)break;}
  S.stock=S.stock.filter(s=>s.n>0);
  return n>0?qacc/n:1;
}

function kSpeed(p){
  if(!K)return 0;
  if(K.stopped[p])return 0;
  const st=staffAt(p);
  let v=st?0.45+st.skill*0.2:0.25;
  if(K.help===p)v+=0.55;
  if(st&&st.quirk==="早起き"&&hourNow()<15)v*=1.3;
  if(st&&st.quirk==="接客の天才"&&p==="serve")v*=1.25;
  if(K.cheer[p]>0)v*=2;
  if(K.boost[p]>0)v*=2;
  return v;
}
function kLoop(ts){
  if(!K)return;
  if(!$("kb-prep")){K=null;return;}
  const dt=Math.min(0.05,(ts-K.last)/1000);K.last=ts;
  K.t-=dt;
  for(const p of POSN){if(K.boost[p]>0)K.boost[p]-=dt;if(K.cheer[p]>0)K.cheer[p]-=dt;}
  const LEN={prep:2.6,main:4,serve:3};
  // 仕込み
  K.bars.prep+=kSpeed("prep")*dt/LEN.prep;
  if(K.bars.prep>=1){K.bars.prep=0;if(K.pb<3)K.pb++;}
  // メイン（仕込み待ちが必要）
  if(K.pb>0){K.bars.main+=kSpeed("main")*dt/LEN.main;
    if(K.bars.main>=1){K.bars.main=0;K.pb--;if(K.sb<3)K.sb++;
      const st=staffAt("main");
      if(st&&st.quirk==="研究熱心"&&Math.random()<0.15){S.cookQ=Math.min(15,S.cookQ+1);toast("🔬 "+st.name+"が絶品を生み出した！");}
    }}
  // 接客（提供待ちが必要）
  if(K.sb>0){K.bars.serve+=kSpeed("serve")*dt/LEN.serve;
    if(K.bars.serve>=1){K.bars.serve=0;K.sb--;K.done++;S.cookQ=Math.min(15,S.cookQ+1);}}
  // 異常発生
  K.spawnT+=dt;
  if(K.spawnT>4){K.spawnT=0;
    const avgSk=POSN.reduce((a,p)=>{const s=staffAt(p);return a+(s?s.skill:0);},0)/3;
    let pr=clamp(0.5-S.habit*0.035-avgSk*0.05+(avgQ()<1?0.15:0),0.08,0.6);
    if(Math.random()<pr)kSpawnAnom();
  }
  // 異常TTL
  for(let i=K.anoms.length-1;i>=0;i--){
    const a=K.anoms[i];
    if(a.ttl!==undefined){a.ttl-=dt;
      if(a.ttl<=0){ // 焦げ発生
        consumeStock(1);S.rep=clamp(S.rep-0.5,0,100);K.burnt++;K.bars.main=0;
        K.anoms.splice(i,1);kRenderAnoms();toast("🔥 焦げた！食材廃棄＆評判ダウン");
      }
    }
  }
  // UI更新
  for(const p of POSN){const el=$("kb-"+p);if(el)el.style.width=(K.bars[p]*100)+"%";}
  const kt=$("kt");if(kt)kt.textContent=Math.ceil(K.t)+"秒";
  const kd=$("kdone");if(kd)kd.textContent=K.done;
  const kq=$("kq");if(kq)kq.textContent=S.cookQ;
  const kpb=$("kpb");if(kpb)kpb.textContent=K.pb;
  const ksb=$("ksb");if(ksb)ksb.textContent=K.sb;
  if(K.t<=0){kEnd(false);return;}
  requestAnimationFrame(kLoop);
}
function kSpawnAnom(){
  const types=[
   {k:"prepStop",pos:"prep",txt:"🧊 仕込みライン停止！",fix:"指示を出す"},
   {k:"burn",pos:"main",txt:"🔥 焦げそう！！",fix:"火を弱める",ttl:3},
   {k:"panic",pos:"serve",txt:"😵 接客がパニック！",fix:"交代する"},
  ];
  const moodys=POSN.filter(p=>{const s=staffAt(p);return s&&s.quirk==="気分屋";});
  if(moodys.length&&Math.random()<0.35)types.push({k:"moody",pos:pick(moodys),txt:"😮‍💨 気分屋の士気が急落…",fix:"声をかける"});
  const t=pick(types);
  if(K.anoms.some(a=>a.pos===t.pos))return;
  const a={id:++K.aid,...t};
  if(t.k!=="burn")K.stopped[t.pos]=true;
  K.anoms.push(a);kRenderAnoms();
}

function demandPerMin(){
  const h=hourNow(),cn=conC(),ct=cityC();
  let base=(h>=11&&h<14)?3.2:(h>=18&&h<22)?3.8:(h>=6&&h<23)?0.8:0.15;
  base*=ct.traffic*(h<17?cn.day:cn.night*ct.nightF);
  const fp=fairPrice();
  const priceF=clamp(Math.exp(-(S.price-fp)/(fp*0.8*(cn.priceTol||1))),0.1,1.8);
  const intF=1+(S.interiorLv-1)*0.05;
  base*=intF*(S.inside&&S.open?1.1:1); // 店主が厨房に立つと出来たてボーナス
  const repF=0.3+S.rep/60;
  const adF=1+(S.ads.flyer>0?0.2:0)+(S.ads.sns>0?0.35:0)+(S.ads.tv>0?0.8:0);
  const toutF=S.buffTalk>0?1.8:1;
  const brandF=1+S.brand/100;
  const rivalF=S.rivalSale>0?0.6:0.85;
  const minaF=S.minaKanban?1.15:1;
  return base*priceF*repF*adF*toutF*brandF*rivalF*minaF;
}

function settle(){
  S.day++;
  const rent=3000+cityC().rent; // 自宅3,000+店（都市による）
  const util=S.custs>0||S.open?2000:0;
  const wages=S.staff.reduce((a,s)=>a+s.wage,0)+(S.st2.mgr?S.st2.mgr.wage:0)+(S.areaMgr?S.areaMgr.wage:0);
  const interest=Math.round(S.loans*0.01);
  // 廃棄
  let waste=0;
  S.stock=S.stock.filter(s=>{if(S.day-s.day>=2){waste+=s.n;return false;}return true;});
  const wasteCost=waste*180;
  // 2号店
  let st2pl=0;
  if(S.st2.owned){
    if(S.st2.mgr)st2pl=Math.round((S.st2.mgr.skill*9000+S.rep*250)*R(0.5,1.4)*(1+S.habit*0.02)-16000);
    else st2pl=-8000;
  }
  // FCロイヤリティ
  let roy=0;
  if(S.fr>0){
    roy=Math.round(S.fr*R(4000,14000)*(1+S.brand/100)*(1+S.habit*0.02));
    if(S.areaMgr)roy=Math.round(roy*(1+S.areaMgr.skill*0.06));
    if(Math.random()<(S.areaMgr?0.02:0.06)){S.rep=clamp(S.rep-4,0,100);log("📰 FC店で接客トラブル！本部の評判に傷が…（評判-4）"+(S.areaMgr?"":"（エリアMgrがいれば防げたかも）"));}
  }
  S.lastRoy=roy;S.st2.lastPl=st2pl;
  const income=roy+Math.max(0,st2pl);
  const outgo=rent+util+wages+interest+Math.max(0,-st2pl);
  S.money+=roy+st2pl-rent-util-wages-interest;
  // 従業員モラール
  S.staff=S.staff.filter(st=>{
    st.morale+=(st.wage>=st.skill*2800?4:-9);
    if(st.morale<30&&Math.random()<0.5){log("💨 "+st.name+"が辞めてしまった…（安月給に不満）");return false;}
    return true;
  });
  // 評判ドリフト
  if(S.custs>0&&S.lost>S.custs*0.3)S.rep=clamp(S.rep-2,0,100);
  if(S.custs>=15&&S.quality>=3)S.rep=clamp(S.rep+1.5,0,100);
  if(S.custs===0)S.rep=clamp(S.rep-0.5,0,100);
  // 食材品質の評判
  if(S.custs>=8){
    const qavg=S.qsum/S.custs;
    if(qavg>=1.6){S.rep=clamp(S.rep+1.5,0,100);log("🥬 高級食材が話題に（評判+）");}
    else if(qavg<=0.4){S.rep=clamp(S.rep-1.5,0,100);log("🧊 「安い食材使ってるらしい」と噂が…（評判-）");}
  }
  S.qsum=0;
  S.brand=clamp(Math.max(0,S.rep-50)*0.6+S.fr*4,0,100);
  // 広告・相場・ライバル
  for(const k in S.ads)if(S.ads[k]>0)S.ads[k]--;
  S.mktRate=S.nextMkt||R(0.8,1.3);S.nextMkt=R(0.8,1.3);hagDisc=0;
  // 習慣化Lv（同じフォーメーションで采配を続けると定着）
  if(S.formKeyT&&S.formKeyT===S.formKeyY){S.habit=Math.min(10,S.habit+1);log("🤝 チームに習慣が定着してきた（習慣化Lv"+S.habit+"）");}
  else if(S.formKeyY&&S.formKeyT!==S.formKeyY){S.habit=Math.max(0,S.habit-1);}
  S.formKeyY=S.formKeyT;S.formKeyT="";
  S.rivalSale=Math.random()<0.2?1:0;
  if(S.rivalSale)log("⚔️ ライバル亭が今日はセールをやるらしい…");
  // サマリー
  const net=S.sales+roy+st2pl-rent-util-wages-interest-0;
  modal(`<h2>📒 ${S.day-1}日目の決算</h2>
   <div class="line"><span>売上（${S.custs}人来店）</span><b class="plus">+${fmt(S.sales)}</b></div>
   ${roy>0?`<div class="line"><span>FCロイヤリティ（${S.fr}店）</span><b class="plus">+${fmt(roy)}</b></div>`:""}
   ${S.st2.owned?`<div class="line"><span>2号店 損益</span><b class="${st2pl>=0?"plus":"minus"}">${st2pl>=0?"+":""}${fmt(st2pl)}</b></div>`:""}
   <div class="line"><span>家賃（店＋自宅）</span><b class="minus">-${fmt(rent)}</b></div>
   <div class="line"><span>水道光熱費</span><b class="minus">-${fmt(util)}</b></div>
   <div class="line"><span>人件費</span><b class="minus">-${fmt(wages)}</b></div>
   ${interest>0?`<div class="line"><span>借金利息</span><b class="minus">-${fmt(interest)}</b></div>`:""}
   ${waste>0?`<div class="line"><span>⚠️ 食材廃棄 ${waste}個（仕入損）</span><b class="minus">${fmt(-wasteCost)}相当</b></div>`:""}
   ${S.lost>0?`<div class="line"><span>😠 品切れで逃した客</span><b class="minus">${S.lost}人</b></div>`:""}
   <div class="line" style="border-bottom:2px solid #333"><span><b>収支</b></span><b class="${net>=0?"plus":"minus"}">${net>=0?"+":""}${fmt(net)}</b></div>
   <div class="line"><span>現在の所持金</span><b class="${S.money>=0?"":"minus"}">${fmt(S.money)}</b></div>
   <button class="btn acc" onclick="closeModal()">${S.day}日目スタート</button>`);
  // 破産判定
  if(S.money<0){
    S.negDays++;
    if(S.negDays>=2){gameOver();return;}
    banner("🚨 資金がマイナス！明日も赤字なら倒産！！");
  }else S.negDays=0;
  S.open=false;S.sales=0;S.custs=0;S.lost=0;
  custs.forEach(c=>scene.remove(c.m));custs.length=0;
  renderHud();save();
}

function phoneUI(){
  const minaOK=S.rels.mina>0||S.minaKanban||S.staff.some(s=>s.mina);
  modal(`<h2>📱 スマホ</h2>
  <p style="font-size:11px;color:#888">電話注文は配達料<b>¥1,500</b>。値切り・世間話・面接は会いに行かないとできない。</p>
  <h2 style="font-size:14px;margin-top:10px">📦 材料の電話注文（10個ずつ・★は品質）</h2>
  ${ALLT.map(t=>{
    const sp=Object.keys(SHOPS).find(k=>SHOPS[k].tier===2&&SHOPS[k].types.includes(t));
    return `<div class="line"><span>${ING[t].e} ${ING[t].n}（在庫${stockTotal(t)}）</span><b>
    <button class="tag" onclick="phoneBuyT('${t}',0)">★1 ${fmt(ingUnit("gyomu",t)*10)}</button>
    <button class="tag" onclick="phoneBuyT('${t}',1)">★2 ${fmt(ingUnit("oyaji",t)*10)}</button>
    <button class="tag" onclick="phoneBuyT('${t}',2)">★3 ${fmt(ingUnit(sp,t)*10)}</button></b></div>`;}).join("")}
  <h2 style="font-size:14px;margin-top:12px">🏦 銀行（電話バンキング）</h2>
  <div class="line"><span>借入 ${fmt(S.loans)}／日利1%</span><b>
    <button class="tag" onclick="phoneLoan()">10万借りる</button>
    <button class="tag" onclick="phoneRepay()">10万返す</button></b></div>
  <h2 style="font-size:14px;margin-top:12px">📣 広告社に発注</h2>
  <div class="line"><span>チラシ 3日+20%</span><b><button class="tag" onclick="phoneAd('flyer',15000,3)">¥15,000</button></b></div>
  <div class="line"><span>SNS運用 5日+35%</span><b><button class="tag" onclick="phoneAd('sns',30000,5)">¥30,000</button></b></div>
  <div class="line"><span>TVCM 4日+80%</span><b><button class="tag" onclick="phoneAd('tv',100000,4)">¥100,000</button></b></div>
  ${minaOK?`<h2 style="font-size:14px;margin-top:12px">💬 チャット</h2>
  <div class="line"><span>🎀 ミナ</span><b><button class="tag" onclick="phoneChat()">メッセージ</button></b></div>`:""}
  <button class="btn" onclick="closeModal()">閉じる</button>`);
}
function phoneBuyT(t,tier){
  const shop=tier===0?"gyomu":tier===1?"oyaji":Object.keys(SHOPS).find(k=>SHOPS[k].tier===2&&SHOPS[k].types.includes(t));
  if(buyIng(shop,t,10,1500))phoneUI();
}
function phoneLoan(){
  if(S.loans>=1000000){toast("融資上限です");return;}
  S.loans+=100000;S.money+=100000;log("💴 電話で10万円を借入");renderHud();phoneUI();
}
function phoneRepay(){
  if(S.loans<=0){toast("借金はない");return;}
  const p=Math.min(100000,S.loans);
  if(S.money<p){toast("返済資金が足りない");return;}
  S.money-=p;S.loans-=p;log("💴 電話で"+fmt(p)+"を返済");renderHud();phoneUI();
}
function phoneAd(k,c,d){
  if(S.money<c){toast("💸 お金が足りない");return;}
  S.money-=c;S.ads[k]=d;log("📣 電話で広告を発注");renderHud();phoneUI();
}
function phoneChat(){
  const lines=S.minaKanban||S.staff.some(s=>s.mina)
   ?["今日もお店がんばりましょうね！🎀","さっきお客さんに褒められちゃいました♪","店長、ちゃんとご飯食べてます？","新メニュー、わたしも味見したいです！"]
   :["公園の桜、きれいですよ🌸","今日もいい天気ですね！","お店、応援してます！","今度お店に遊びに行きますね♪"];
  modal(`<h2>💬 ミナ</h2>
  <div style="background:#f0f7f4;border-radius:12px;padding:12px;font-size:13px;margin:8px 0">「${pick(lines)}」</div>
  <button class="btn" onclick="phoneUI()">戻る</button>`);
}
// ---------------- 全国出店・コンセプト選択 ----------------
function citySelect(){
  modal(`<h2>🗾 全国出店マップ</h2>
  <p style="font-size:12px;color:#666;margin-bottom:8px">日本のどこで人生を始める？（家賃・人通り・客層が変わる）</p>`+
   Object.keys(CITIES).map(k=>{const c=CITIES[k];
    return `<button class="opt" onclick="chooseCity('${k}')">${c.e} ${c.n}<small>家賃 日${fmt(c.rent+3000)}・人通り${Math.round(c.traffic*100)}%・${c.desc}</small></button>`;}).join(""));
}
function chooseCity(k){S.city=k;applyTheme();conceptModal(false);}
function conceptModal(change){
  if(change&&dlgOn)closeDlg();
  modal(`<h2>${change?"🛠 業態転換（¥150,000）":"🏮 店のコンセプトを決めよう"}</h2>`+
   Object.keys(CONCEPTS).map(k=>{const c=CONCEPTS[k];
    return `<button class="opt" onclick="chooseConcept('${k}',${change?1:0})">${c.e} ${c.n}<small>${c.desc}</small></button>`;}).join("")+
   (change?'<button class="btn ghost" onclick="closeModal()">やめる</button>':""));
}
function chooseConcept(k,change){
  if(change){
    if(S.money<150000){toast("¥150,000必要");return;}
    if(S.concept===k){toast("いまと同じコンセプトだ");return;}
    S.money-=150000;
  }
  S.concept=k;
  S.menu=BASE_MENUS[k].slice(0,Math.max(2,Math.min(6,Math.ceil(S.quality*0.6)))).map(d=>({n:d.n,rec:d.rec.slice()}));
  repaintShop();closeModal();
  banner(conC().e+" "+cityC().n+"に「"+conC().n+"」"+(change?"へ業態転換！":"を開業！"));
  log(change?"店を「"+conC().n+"」に改装した":cityC().n+"で「"+conC().n+"」を開業した");
  save();renderHud();
}
function repaintShop(){B.shop.children[0].material.color.setHex(conC().color);}
// ---------------- ミニマップ ----------------
function drawMap(){
  const c=$("mmap").getContext("2d");
  c.clearRect(0,0,140,140);
  c.fillStyle="rgba(247,246,243,.92)";c.fillRect(0,0,140,140);
  const P=v=>(v+60)*(140/120);
  c.fillStyle="#b5b1a8";
  c.fillRect(P(-55),P(0)-5,P(55)-P(-55),10);
  c.fillRect(P(0)-5,P(-56),10,P(36)-P(-56)+5);
  c.fillRect(P(-35),P(-30)-4,P(35)-P(-35),8);
  MAPB.forEach(b=>{c.fillStyle=b.c;c.fillRect(P(b.x-b.w/2),P(b.z-b.d/2),Math.max(4,b.w*140/120),Math.max(4,b.d*140/120));});
  c.fillStyle="#2f6f5e";
  for(const k in NPC){c.beginPath();c.arc(P(NPC[k].m.position.x),P(NPC[k].m.position.z),2,0,7);c.fill();}
  c.fillStyle="#3a6ea5";
  custs.forEach(u=>{if(u.m.visible){c.beginPath();c.arc(P(u.m.position.x),P(u.m.position.z),2,0,7);c.fill();}});
  c.fillStyle="#d95d39";
  c.beginPath();c.arc(P(player.position.x),P(player.position.z),4.5,0,7);c.fill();
  c.strokeStyle="#fff";c.lineWidth=1.5;c.stroke();
  c.fillStyle="#7a1f0a";c.font="bold 10px sans-serif";c.fillText("店",P(0)-5,P(20)+4);
  if(S.inside){
    c.fillStyle="rgba(20,18,15,.55)";c.fillRect(0,0,140,140);
    c.fillStyle="#fff";c.font="bold 12px sans-serif";c.fillText("🏮 店内にいます",28,74);
  }
}
// ---------------- 空・昼夜 ----------------
function skyUpdate(){
  const h=hourNow();
  let c,f,i;
  if(h>=5&&h<8){c=0xffdfb8;i=0.7;}
  else if(h>=8&&h<16){c=0xbfe0ff;i=1.0;}
  else if(h>=16&&h<19){c=0xffc490;i=0.7;}
  else{c=0x1c2340;i=0.25;}
  scene.background=new THREE.Color(c);
  scene.fog.color.set(c);
  sun.intensity=i*0.8;amb.intensity=Math.max(0.35,i*0.9);
}
// ---------------- MAIN LOOP ----------------
let last=performance.now(),hudT=0,saveT=0;
function loop(ts){
  const dt=Math.min(0.05,(ts-last)/1000);last=ts;
  if(!S.gameOver){
    // 時間 1実秒=2ゲーム分
    S.tmin+=dt*2;
    if(S.tmin>=1440){S.tmin-=1440;settle();}
    // 深夜2時に強制ダウン
    if(hourNow()>=2&&hourNow()<3&&S.sleptDay<S.day&&S.tmin>=120&&S.tmin<180){
      S.money-=10000;player.position.set(-38,0,17.5);
      banner("😵 過労で倒れた…病院代¥10,000（家に運ばれた）");
      S.tmin=360;S.stam=Math.round(S.maxStam*0.5);S.sleptDay=S.day;
    }
    // ステータス自然減
    S.hunger=clamp(S.hunger-dt*0.10,0,100);
    if(S.hunger<=5)S.stam=clamp(S.stam-dt*0.5,0,S.maxStam);
    // 移動
    if(!dlgOn){
      let mx=(keys.d||keys.arrowright?1:0)-(keys.a||keys.arrowleft?1:0)+joy.dx;
      let mz=(keys.s||keys.arrowdown?1:0)-(keys.w||keys.arrowup?1:0)+joy.dz;
      const len=Math.hypot(mx,mz);
      if(len>0.1){
        mx/=Math.max(1,len);mz/=Math.max(1,len);
        const sp=(S.stam<15?4:8)*dt;
        const bx=S.inside?[193,207]:[-52,52],bz=S.inside?[197.5,207.5]:[-56,36];
        const nx=clamp(player.position.x+mx*sp,bx[0],bx[1]);
        const nz=clamp(player.position.z+mz*sp,bz[0],bz[1]);
        if(!collide(nx,player.position.z))player.position.x=nx;
        if(!collide(player.position.x,nz))player.position.z=nz;
        player.rotation.y=Math.atan2(mx,mz);
        player.position.y=Math.abs(Math.sin(ts*0.012))*0.12;
      }else player.position.y=0;
    }
    // カメラ
    camera.position.lerp(new THREE.Vector3(player.position.x,15,player.position.z+13),0.08);
    camera.lookAt(player.position.x,1.5,player.position.z);
    // 通行人
    peds.forEach(p=>{
      const dx=p.tx-p.m.position.x,dz=p.tz-p.m.position.z,d=Math.hypot(dx,dz);
      if(d<1){p.tx=R(-45,45);p.tz=R(-45,32);}
      else{p.m.position.x+=dx/d*p.sp*dt;p.m.position.z+=dz/d*p.sp*dt;p.m.rotation.y=Math.atan2(dx,dz);p.m.position.y=Math.abs(Math.sin(ts*0.01+p.sp*7))*0.1;}
    });
    // 客
    for(let i=custs.length-1;i>=0;i--){
      const c=custs[i];
      if(c.phase==="walk"){
        const w=c.wp[0];
        const dx=w[0]-c.m.position.x,dz=w[1]-c.m.position.z,d=Math.hypot(dx,dz);
        if(d<0.8){c.wp.shift();if(!c.wp.length)serveCust(c);}
        else{c.m.position.x+=dx/d*3.2*dt;c.m.position.z+=dz/d*3.2*dt;c.m.rotation.y=Math.atan2(dx,dz);c.m.position.y=Math.abs(Math.sin(ts*0.013+i))*0.12;}
      }else if(c.phase==="eat"){
        c.t-=dt;
        if(c.t<=0){c.m.visible=true;c.phase="leave";c.tx=pick([-52,52]);c.m.position.set(R(-2,2),0,13);}
      }else if(c.phase==="leave"||c.phase==="angry"){
        if(c.phase==="angry"&&c.t===0){c.t=1;c.tx=pick([-52,52]);}
        const dx=c.tx-c.m.position.x;
        c.m.position.x+=Math.sign(dx)*3.5*dt;
        c.m.position.z+=(0-c.m.position.z)*dt*0.5;
        c.m.rotation.y=Math.atan2(Math.sign(dx),0);
        if(Math.abs(dx)<2){scene.remove(c.m);custs.splice(i,1);}
      }
    }
    // FX
    for(let i=fx.length-1;i>=0;i--){
      const f=fx[i];f.age+=dt;f.s.position.y+=dt*1.5;
      f.s.material.opacity=1-f.age;
      if(f.age>1){scene.remove(f.s);fx.splice(i,1);}
    }
    // 店内の座席（食事中の客が座って見える）
    const eating=custs.filter(c=>c.phase==="eat").length;
    sitters.forEach((s,i)=>{s.visible=i<eating;});
    salesTick(dt);
    checkInteract();
    skyUpdate();
    hudT+=dt;if(hudT>0.3){hudT=0;renderHud();drawMap();}
    saveT+=dt;if(saveT>10){saveT=0;save();}
  }
  renderer.render(scene,camera);
  requestAnimationFrame(loop);
}
// ---------------- INIT ----------------
load();
if(S.gameOver){$("over").classList.add("on");
  $("overTxt").innerHTML="前回は倒産してしまった…。<br>再挑戦しよう。";
}
if(S.minaKanban||S.staff.some(s=>s.mina)||(S.st2.mgr&&S.st2.mgr.mina))NPC.mina.m.position.set(4.5,0,14);
if(S.st2.owned){const lb=makeLabel("2号店",1,"rgba(217,93,57,.9)");lb.position.set(-18,8,20);scene.add(lb);}
renderHud();
function startFlow(){if(!S.city)citySelect();else if(!S.concept)conceptModal(false);else closeModal();}
// 旧バージョンのセーブを移行（材料の種類がない在庫は破棄・メニュー生成）
S.stock=S.stock.filter(s=>s.t);
ensureMenu();
if(S.concept)repaintShop();
if(S.city)applyTheme();
if(S.hq)buildHQ();
if(S.inside)player.position.set(200,0,204);
if(!S.gameOver&&(S.day>1||S.custs>0)&&!S.city){citySelect();}
else if(S.day===1&&S.custs===0&&S.sales===0&&!S.gameOver){
  modal(`<h2>🏮 名店ものがたり3D 〜全国出店編〜</h2>
  <p style="font-size:13px;line-height:1.9;color:#555">
  あなたは料理人。資金<b>30万円</b>を握りしめ、日本のどこかで店を開く。<br><br>
  🚶 <b>移動</b>：WASD／矢印キー、スマホは画面左をドラッグ<br>
  🗣 <b>行動</b>：人や建物に近づいてボタン（<kbd>E</kbd>キー）<br>
  📱 <b>スマホ</b>：電話注文・チャット（割高だけど便利）<br>
  🗺 <b>右下マップ</b>で町を把握<br><br>
  📦 仕入れは3軒（激安★1／標準★2／名店★3）から。鮮度2日で廃棄！<br>
  雇用・広告・融資・業態転換・2号店・フランチャイズ…全部あなた次第。<br><br>
  <b style="color:var(--danger)">⚠️ 所持金マイナスが2日続くと倒産（ゲームオーバー）</b></p>
  <button class="btn acc" onclick="startFlow()">人生スタート</button>`);
}
requestAnimationFrame(loop);
</script>
